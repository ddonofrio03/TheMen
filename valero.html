<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valero Texas Open — Golf Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3a;
    --green-light: #e8f5ee;
    --green-mid: #2d8a52;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --gold: #b8963e;
    --gold-light: #fdf6e3;
    --ink: #1a1a18;
    --ink-mid: #4a4a46;
    --ink-light: #8a8a84;
    --border: #e0dfd8;
    --surface: #fafaf7;
    --white: #ffffff;
    --cut: #9a9a94;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--green-mid);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .wordmark-link {
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .wordmark-link:hover {
    opacity: 0.8;
  }

  .wordmark {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .wordmark-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .wordmark-event {
    font-size: 12px;
    font-weight: 300;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: #6be08a;
    font-family: 'DM Mono', monospace;
  }

  .live-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6be08a;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid #444;
    border-radius: 4px;
    background: transparent;
    color: #ccc;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .refresh-btn:hover { border-color: #888; color: #fff; }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #666;
  }

  /* ── COUNTDOWN BAR ── */
  .countdown-bar {
    background: var(--ink);
    border-bottom: 1px solid #2a2a28;
    padding: 4px 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
  }

  #countdown { color: #888; }

  /* ── TABS ── */
  .tabs-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: none;
    background: none;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: var(--ink-mid); }
  .tab.active { color: var(--ink); border-bottom-color: var(--green-mid); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 60px;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ── STATUS BAR ── */
  .status-msg {
    font-size: 13px;
    color: var(--ink-light);
    padding: 12px 0 20px;
    font-family: 'DM Mono', monospace;
  }

  .status-msg.error { color: var(--red); }

  /* ── SCOREBOARD GRID ── */
  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  .bettor-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .card-total {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
  }

  .card-total.under { color: #6be08a; }
  .card-total.over  { color: #ff8080; }
  .card-total.even  { color: #aaa; }

  .card-body { padding: 0; }

  .pick-row {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .pick-row:last-child { border-bottom: none; }

  .pick-row.cut-row { opacity: 0.75; background: #fdecea; }
  .pick-row.cut-row .pick-name { color: #b03030; }
  .pick-row.cut-row .pick-score { color: #b03030; }

  .pick-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-light);
    min-width: 14px;
  }

  .pick-info { flex: 1; min-width: 0; }

  .pick-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pick-detail {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .pick-score {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    min-width: 38px;
    text-align: right;
  }

  .pick-score.under { color: var(--green); }
  .pick-score.over  { color: var(--red); }
  .pick-score.even  { color: var(--ink-mid); }
  .pick-score.cut   { color: var(--cut); font-size: 12px; }
  .pick-score.ns    { color: var(--ink-light); }

  .penalty-tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #fff3cd;
    color: #856404;
    font-family: 'DM Mono', monospace;
    margin-left: 4px;
  }

  /* ── ROUND ROW ── */
  .card-rounds {
    display: flex;
    border-top: 2px solid var(--border);
    background: #f5f5f2;
  }

  .round-cell {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-right: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  .round-cell:last-child { border-right: none; }

  .round-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    display: block;
  }

  .round-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
    display: block;
    margin-top: 1px;
  }

  .round-val.under { color: var(--green); }
  .round-val.over  { color: var(--red); }
  .round-val.best  { color: var(--gold); font-weight: 600; }

  /* ── POINTS TABLE ── */
  .pts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .pts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .pts-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #f5f5f2;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  .pts-table th:first-child { text-align: left; }

  .pts-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-mid);
  }

  .pts-table tr:last-child td { border-bottom: none; }

  .pts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink);
  }

  .pts-table td.winner-col {
    color: var(--gold);
    font-weight: 500;
  }

  .pts-total-col {
    font-weight: 600 !important;
    color: var(--ink) !important;
    font-size: 15px !important;
  }

  .pts-win {
    background: #f5fbf7 !important;
  }

  .pts-table td.pts-earned {
    color: var(--green);
    font-weight: 500;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    margin-right: 8px;
  }

  .rank-1 { background: var(--gold-light); color: var(--gold); }
  .rank-2 { background: #f0f0ee; color: var(--ink-mid); }
  .rank-3 { background: #fdf0ee; color: #b0634a; }
  .rank-n { background: var(--surface); color: var(--ink-light); }

  /* ── TEAM SCORES ── */
  .ts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .ts-bettor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .ts-bettor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .ts-bettor-total {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #aaa;
  }

  .ts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }

  .ts-table th {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #f5f5f2;
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  .ts-table th:first-child { text-align: left; width: 35%; }
  .ts-table th:last-child { background: #eeeee8; }

  .ts-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #f0f0ec;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
    color: var(--ink-mid);
  }

  .ts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 13px;
  }

  .ts-table tr:last-child td { border-bottom: none; }
  .ts-table tr.ts-totals td {
    background: #f5f5f2;
    font-weight: 600;
    border-top: 2px solid var(--border);
    border-bottom: none;
  }
  .ts-table tr.ts-totals td:first-child { color: var(--ink-mid); }
  .ts-table td.ts-total-col { background: #eeeee8; font-weight: 600; }
  .ts-table th.ts-total-col { background: #eeeee8; }
  .ts-table tr.cut-row td:first-child { color: #b03030; }

  /* ── LEADERBOARD ── */
  .lb-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .lb-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .lb-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #f5f5f2;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .lb-table th.right { text-align: right; }

  .lb-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0ec;
    color: var(--ink);
    font-size: 13px;
  }

  .lb-table td.mono { font-family: 'DM Mono', monospace; }
  .lb-table td.right { text-align: right; }
  .lb-table td.muted { color: var(--ink-light); font-family: 'DM Mono', monospace; }

  .lb-table tr.tracked { background: #f7fdf9; }
  .lb-table tr.tracked td:nth-child(2) { font-weight: 500; }
  .lb-table tr.cut-row { opacity: 0.7; background: #fdecea; }

  .owner-pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--green-light);
    color: var(--green);
    font-family: 'DM Mono', monospace;
    margin-left: 6px;
    font-weight: 500;
  }

  .penalty-note {
    margin-top: 10px;
    padding: 10px 14px;
    background: #fffbf0;
    border: 1px solid #f0e0a0;
    border-radius: 6px;
    font-size: 12px;
    color: #7a6020;
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; }
    main, .tabs-wrap { padding-left: 16px; padding-right: 16px; }
    .board-grid { grid-template-columns: 1fr; }
    .wordmark-event { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wordmark">
      <a href="https://ddonofrio03.github.io/TheMen/" class="wordmark-link">
        <span class="wordmark-title">The Men</span>
      </a>
      <span class="wordmark-event" id="event-name">Valero Texas Open · TPC San Antonio</span>
    </div>
    <div class="header-right">
      <span class="live-dot" id="live-indicator">LIVE</span>
      <span class="last-update" id="last-update">--</span>
      <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
    </div>
  </div>
</header>

<div class="countdown-bar">
  Next auto-refresh in <span id="countdown">60s</span>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('scoreboard')">Scoreboard</button>
    <button class="tab" onclick="showTab('teamscores')">Team Scores</button>
    <button class="tab" onclick="showTab('cash')">Cash Won</button>
    <button class="tab" onclick="showTab('leaderboard')">Full Field</button>
  </div>
</div>

<main>
  <div id="status-msg" class="status-msg"></div>
  <div id="scoreboard" class="section active"></div>
  <div id="cash" class="section"></div>
  <div id="teamscores" class="section"></div>
  <div id="leaderboard" class="section"></div>
</main>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CONFIG = {
  tournamentId: "401811940", 
  eventName: "Valero Texas Open",
  bettors: ["Dave","TJ","Billy","Nick","Ry","Alex"],
  picks: {
    Dave:  ["", "", "", ""],
    TJ:    ["", "", "", ""],
    Billy: ["", "", "", ""],
    Nick:  ["", "", "", ""],
    Ry:    ["", "", "", ""],
    Alex:  ["", "", "", ""]
  },
  // Golfer names removed as requested, keeping structure so code doesn't break
  alts: {
    Dave:  "",
    TJ:    "",
    Billy: "",
    Nick:  "",
    Ry:    "",
    Alex:  ""
  },
  points: { R1: 12, R2: 12, R3: 12, R4: 12, Overall: 12, Winner: 12 },
  refreshInterval: 60,
  colors: {
    Dave:  { bg: "#6CABDD", text: "#ffffff" },
    TJ:    { bg: "#006F71", text: "#ffffff" },
    Billy: { bg: "#7d3c98", text: "#d2b4de" },
    Nick:  { bg: "#b7950b", text: "#f9e79f" },
    Ry:    { bg: "#b03a2e", text: "#f1948a" },
    Alex:  { bg: "#1a237e", text: "#c5cae9" }
  }
};

let scoreMap = {};
let countdown = CONFIG.refreshInterval;
let countdownTimer = null;
let fetching = false;

function parseRelScore(s) {
  if (!s || s === "--" || s === "-" || s === "CUT" || s === "WD") return null;
  if (s === "E") return 0;
  const n = parseInt(s.replace("+", ""));
  return isNaN(n) ? null : n;
}

function fmtRel(n) {
  if (n === null || n === undefined) return "--";
  if (n === 0) return "E";
  return n > 0 ? "+" + n : String(n);
}

function relClass(n) {
  if (n === null) return "ns";
  if (n < 0) return "under";
  if (n > 0) return "over";
  return "even";
}

function penaltyScore(roundKey, teamPlayers) {
  const teamSet = new Set(teamPlayers);
  const allPicked = new Set(Object.values(CONFIG.picks).flat());
  let worst = null;
  allPicked.forEach(name => {
    if (teamSet.has(name)) return;
    const info = scoreMap[name];
    if (!info || info.isCut || info.isWD) return;
    const val = parseRelScore(info[roundKey]);
    if (val !== null && (worst === null || val > worst)) worst = val;
  });
  if (worst === null) return null;
  return worst + 2;
}

function teamRoundTotal(bettor, roundKey) {
  const players = CONFIG.picks[bettor];
  const penaltyRounds = new Set(["r3", "r4"]);
  let total = 0;
  let hasAny = false;
  players.forEach(player => {
    const info = scoreMap[player];
    if (!info) return;
    const actual = parseRelScore(info[roundKey]);
    if (actual !== null) {
      total += actual;
      hasAny = true;
    } else if ((info.isCut || info.isWD) && penaltyRounds.has(roundKey)) {
      const pen = penaltyScore(roundKey, players);
      if (pen !== null) { total += pen; hasAny = true; }
    }
  });
  return hasAny ? total : null;
}

function isRoundComplete(roundKey) {
  const entries = Object.values(scoreMap);
  if (!entries.length) return false;
  const relevant = entries.filter(p => !p.isCut && !p.isWD && (p.r1holes ?? 0) > 0);
  if (!relevant.length) return false;
  const holesKey = roundKey + "holes";
  return relevant.every(p => (p[holesKey] ?? 0) === 18);
}

function isTournamentFinal() {
  return isRoundComplete("r4");
}

function calcPoints() {
  const pts = {};
  CONFIG.bettors.forEach(b => {
    pts[b] = { R1: 0, R2: 0, R3: 0, R4: 0, Overall: 0, Winner: 0,
                Earned: 0, BuyIn: 0, Net: 0, Total: 0 };
  });

  const roundDefs = [
    { label: "R1", key: "r1" }, { label: "R2", key: "r2" },
    { label: "R3", key: "r3" }, { label: "R4", key: "r4" }
  ];

  roundDefs.forEach(({ label, key }) => {
    if (!isRoundComplete(key)) return;
    const totals = {};
    CONFIG.bettors.forEach(b => { totals[b] = teamRoundTotal(b, key); });
    const valid = Object.values(totals).filter(n => n !== null);
    if (!valid.length) return;
    const best = Math.min(...valid);
    const winners = CONFIG.bettors.filter(b => totals[b] === best);
    const share = Math.round((CONFIG.points[label] / winners.length) * 100) / 100;
    winners.forEach(b => pts[b][label] = share);
  });

  if (isTournamentFinal()) {
    const overalls = {};
    CONFIG.bettors.forEach(b => {
      let total = 0, hasAny = false;
      roundDefs.forEach(({ key }) => {
        const v = teamRoundTotal(b, key);
        if (v !== null) { total += v; hasAny = true; }
      });
      overalls[b] = hasAny ? total : null;
    });
    const validO = Object.values(overalls).filter(n => n !== null);
    if (validO.length) {
      const bestO = Math.min(...validO);
      const winnersO = CONFIG.bettors.filter(b => overalls[b] === bestO);
      const shareO = Math.round((CONFIG.points.Overall / winnersO.length) * 100) / 100;
      winnersO.forEach(b => pts[b].Overall = shareO);
    }
  }

  const buyIn = CONFIG.points.R1;
  CONFIG.bettors.forEach(b => {
    const earned = pts[b].R1 + pts[b].R2 + pts[b].R3 + pts[b].R4 + pts[b].Overall + pts[b].Winner;
    pts[b].Earned = earned;
    pts[b].BuyIn  = buyIn;
    pts[b].Net    = Math.round((earned - buyIn) * 100) / 100;
  });
  return pts;
}

async function fetchScores() {
  const url = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
  const res  = await fetch(url);
  const data = await res.json();
  let event = data.events?.find(e => e.id === CONFIG.tournamentId);
  if (!event) event = data.events?.[0];
  if (!event) throw new Error("No event found");
  document.getElementById("event-name").textContent = event.name || CONFIG.eventName;
  const newMap = {};
  const comp = event.competitions?.[0];
  if (!comp) throw new Error("No competition data");
  const competitors = comp.competitors || [];
  competitors.forEach((p, idx) => {
    const name = p.athlete?.displayName;
    if (!name) return;
    const isWD = p.score === "WD" || p.score === "wd";
    const ls = p.linescores || [];
    const r1 = ls[0]?.displayValue || "--";
    const r2 = ls[1]?.displayValue || "--";
    const r3 = ls[2]?.displayValue || "--";
    const r4 = ls[3]?.displayValue || "--";
    const r1holes = ls[0]?.linescores?.length ?? 0;
    const r2holes = ls[1]?.linescores?.length ?? 0;
    const r3holes = ls[2]?.linescores?.length ?? 0;
    const r4holes = ls[3]?.linescores?.length ?? 0;
    
    newMap[name] = { score: p.score || "E", today: p.currenRoundScore || "--", pos: p.currenPosition || "--", 
                     r1, r2, r3, r4, r1holes, r2holes, r3holes, r4holes, isCut: p.score === "CUT", isWD };
  });
  return newMap;
}

function renderScoreboard() {
  const el = document.getElementById("scoreboard");
  const pts = calcPoints();
  let html = '<div class="board-grid">';
  CONFIG.bettors.forEach(bettor => {
    const bColor = CONFIG.colors[bettor];
    const r1t = teamRoundTotal(bettor, "r1");
    html += `<div class="bettor-card">
      <div class="card-header" style="background:${bColor.bg}">
        <span class="card-name">${bettor}</span>
      </div>
      <div class="card-body">`;
    CONFIG.picks[bettor].forEach((player, i) => {
      const info = scoreMap[player] || {};
      html += `<div class="pick-row">
        <span class="pick-num">${i+1}</span>
        <div class="pick-info"><div class="pick-name">${player || "TBD"}</div></div>
        <div class="pick-score">${info.score || "--"}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html + "</div>";
}
