<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Men — Masters 2026 Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1a5c2a;--dark:#0d3318;--gold:#c8a951;--gold-lt:#f5e9c4;
    --ink:#1a1a18;--mid:#4a4a46;--light:#8a8a84;--border:#e0dfd8;
    --surface:#f7f6f2;--white:#ffffff;--red:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;}
  header{background:var(--dark);border-bottom:3px solid var(--gold);}
  .hdr{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;}
  .sub{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:300;margin-left:10px;}
  
  /* RESTART BUTTON STYLES */
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .restart-btn-ui {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 10px;
    background: transparent;
    color: #ff8a8a;
    border: 1px solid #ff8a8a;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .restart-btn-ui:hover {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  .status-pill{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:10px;background:#1a3320;color:#6be08a;}
  main{max-width:960px;margin:0 auto;padding:24px 24px 80px;}

  .screen{display:none;}.screen.active{display:block;}

  /* SETUP */
  .setup-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:28px;max-width:520px;margin:0 auto;}
  .setup-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:6px;}
  .setup-desc{font-size:13px;color:var(--mid);margin-bottom:24px;line-height:1.6;}
  .order-list{list-style:none;margin-bottom:20px;}
  .order-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:grab;user-select:none;transition:box-shadow 0.15s;}
  .order-item.drag-over{border-color:var(--green);background:#f0f8f2;}
  .order-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--light);min-width:18px;}
  .order-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.5px;flex:1;}
  .drag-handle{color:var(--light);font-size:18px;}
