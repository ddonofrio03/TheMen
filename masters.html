<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Men — The Masters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #006747;
    --green-light: #e4f2ec;
    --green-mid: #008B5E;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --gold: #c8a951;
    --gold-light: #fdf6e3;
    --ink: #1a2e1a;
    --ink-mid: #3a4a3a;
    --ink-light: #7a8a7a;
    --border: #d4ddd4;
    --surface: #f5f8f5;
    --white: #ffffff;
    --cut: #9a9a94;
    --augusta-dark: #004d34;
    --augusta-yellow: #fff2cc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--augusta-dark);
    color: var(--white);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* Masters Logo */
  .masters-logo {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .wordmark-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .wordmark-event {
    font-size: 12px;
    font-weight: 300;
    color: #8abfa6;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: #f0d060;
    font-family: 'DM Mono', monospace;
  }

  .live-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #f0d060;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid #2a6a4a;
    border-radius: 4px;
    background: transparent;
    color: #8abfa6;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .refresh-btn:hover { border-color: var(--gold); color: #fff; }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #5a8a6a;
  }

  /* ── COUNTDOWN BAR ── */
  .countdown-bar {
    background: #003a26;
    border-bottom: 1px solid #004d34;
    padding: 4px 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #4a7a5a;
  }

  #countdown { color: #6a9a7a; }

  /* ── TABS ── */
  .tabs-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: none;
    background: none;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: var(--ink-mid); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 60px;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ── STATUS BAR ── */
  .status-msg {
    font-size: 13px;
    color: var(--ink-light);
    padding: 12px 0 20px;
    font-family: 'DM Mono', monospace;
  }

  .status-msg.error { color: var(--red); }

  /* ── SCOREBOARD GRID ── */
  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  .bettor-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .card-total {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
  }

  .card-total.under { color: #6be08a; }
  .card-total.over  { color: #ff8080; }
  .card-total.even  { color: #aaa; }

  .card-body { padding: 0; }

  .pick-row {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .pick-row:last-child { border-bottom: none; }

  .pick-row.cut-row { opacity: 0.75; background: #fdecea; }
  .pick-row.cut-row .pick-name { color: #b03030; }
  .pick-row.cut-row .pick-score { color: #b03030; }
  .pick-row.cut-row-subtle { opacity: 0.75; background: #fdecea; }
  .pick-row.cut-row-subtle .pick-name { color: #b03030; }
  .pick-row.cut-row-subtle .pick-score { color: #b03030; }

  .pick-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-light);
    min-width: 14px;
  }

  .pick-info { flex: 1; min-width: 0; }

  .pick-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pick-detail {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .pick-score {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    min-width: 38px;
    text-align: right;
  }

  .pick-score.under { color: var(--green); }
  .pick-score.over  { color: var(--red); }
  .pick-score.even  { color: var(--ink-mid); }
  .pick-score.cut   { color: var(--cut); font-size: 12px; }
  .pick-score.ns    { color: var(--ink-light); }

  .penalty-tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #fff3cd;
    color: #856404;
    font-family: 'DM Mono', monospace;
    margin-left: 4px;
  }

  /* ── ROUND ROW ── */
  .card-rounds {
    display: flex;
    border-top: 2px solid var(--border);
    background: #eef4ee;
  }

  .round-cell {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-right: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  .round-cell:last-child { border-right: none; }

  .round-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    display: block;
  }

  .round-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
    display: block;
    margin-top: 1px;
  }

  .round-val.under { color: var(--green); }
  .round-val.over  { color: var(--red); }
  .round-val.best  { color: var(--gold); font-weight: 600; }

  /* ── POINTS TABLE ── */
  .pts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .pts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .pts-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #eef4ee;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  .pts-table th:first-child { text-align: left; }

  .pts-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-mid);
  }

  .pts-table tr:last-child td { border-bottom: none; }

  .pts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink);
  }

  .pts-table td.winner-col {
    color: var(--gold);
    font-weight: 500;
  }

  .pts-total-col {
    font-weight: 600 !important;
    color: var(--ink) !important;
    font-size: 15px !important;
  }

  .pts-win {
    background: #f0f8f0 !important;
  }

  .pts-table td.pts-earned {
    color: var(--green);
    font-weight: 500;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    margin-right: 8px;
  }

  .rank-1 { background: var(--gold-light); color: var(--gold); }
  .rank-2 { background: #f0f0ee; color: var(--ink-mid); }
  .rank-3 { background: #fdf0ee; color: #b0634a; }
  .rank-n { background: var(--surface); color: var(--ink-light); }

  /* ── TEAM SCORES ── */
  .ts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .ts-bettor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .ts-bettor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .ts-bettor-total {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #aaa;
  }

  .ts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }

  .ts-table th {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #eef4ee;
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  .ts-table th:first-child { text-align: left; width: 35%; }
  .ts-table th:last-child { background: #ddeedd; }

  .ts-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #e8f0e8;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
    color: var(--ink-mid);
  }

  .ts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 13px;
  }

  .ts-table tr:last-child td { border-bottom: none; }
  .ts-table tr.ts-totals td {
    background: #eef4ee;
    font-weight: 600;
    border-top: 2px solid var(--border);
    border-bottom: none;
  }
  .ts-table tr.ts-totals td:first-child { color: var(--ink-mid); }
  .ts-table td.ts-total-col { background: #ddeedd; font-weight: 600; }
  .ts-table th.ts-total-col { background: #ddeedd; }
  .ts-table tr.cut-row td:first-child { color: #b03030; }

  /* ── LEADERBOARD ── */
  .lb-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .lb-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .lb-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: #eef4ee;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .lb-table th.right { text-align: right; }

  .lb-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #e8f0e8;
    color: var(--ink);
    font-size: 13px;
  }

  .lb-table td.mono { font-family: 'DM Mono', monospace; }
  .lb-table td.right { text-align: right; }
  .lb-table td.muted { color: var(--ink-light); font-family: 'DM Mono', monospace; }

  .lb-table tr.tracked { background: #f0f8f0; }
  .lb-table tr.tracked td:nth-child(2) { font-weight: 500; }
  .lb-table tr.cut-row { opacity: 0.7; background: #fdecea; }

  .owner-pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--green-light);
    color: var(--green);
    font-family: 'DM Mono', monospace;
    margin-left: 6px;
    font-weight: 500;
  }

  /* ── PENALTY NOTE ── */
  .penalty-note {
    margin-top: 10px;
    padding: 10px 14px;
    background: #fffbf0;
    border: 1px solid #f0e0a0;
    border-radius: 6px;
    font-size: 12px;
    color: #7a6020;
    font-family: 'DM Mono', monospace;
  }

  /* ── LOADING STATE ── */
  .loading-overlay {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-light);
    font-size: 14px;
  }

  .loader {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; }
    main, .tabs-wrap { padding-left: 16px; padding-right: 16px; }
    .board-grid { grid-template-columns: 1fr; }
    .wordmark-event { display: none; }
    .masters-logo { width: 36px; height: 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wordmark">
      <!-- Masters-style flag/logo as inline SVG -->
      <svg class="masters-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Flagstick -->
        <rect x="28" y="10" width="3" height="80" rx="1.5" fill="#e0d8c0"/>
        <!-- Flag -->
        <polygon points="31,10 75,24 31,38" fill="#f0d040"/>
        <polygon points="31,10 75,24 31,38" fill="url(#flagShade)" opacity="0.3"/>
        <!-- Flag detail -->
        <text x="46" y="29" font-family="serif" font-size="14" font-weight="bold" fill="#006747" text-anchor="middle">M</text>
        <!-- Cup/hole -->
        <ellipse cx="30" cy="90" rx="18" ry="5" fill="#2a5a3a"/>
        <ellipse cx="30" cy="88" rx="14" ry="4" fill="#1a4a2a"/>
        <defs>
          <linearGradient id="flagShade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
          </linearGradient>
        </defs>
      </svg>
      <div>
        <span class="wordmark-title">The Men</span><br>
        <span class="wordmark-event" id="event-name">The Masters · Augusta National</span>
      </div>
    </div>
    <div class="header-right">
      <span class="live-dot" id="live-indicator">LIVE</span>
      <span class="last-update" id="last-update">--</span>
      <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
    </div>
  </div>
</header>

<div class="countdown-bar">
  Next auto-refresh in <span id="countdown">60s</span>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('scoreboard')">Scoreboard</button>
    <button class="tab" onclick="showTab('teamscores')">Team Scores</button>
    <button class="tab" onclick="showTab('cash')">Cash Won</button>
    <button class="tab" onclick="showTab('leaderboard')">Full Field</button>
  </div>
</div>

<main>
  <div id="status-msg" class="status-msg"></div>

  <div id="scoreboard" class="section active"></div>
  <div id="cash" class="section"></div>
  <div id="teamscores" class="section"></div>
  <div id="leaderboard" class="section"></div>
</main>

<script>
// ═══════════════════════════════════════════════
// CONFIG — UPDATE PICKS HERE BEFORE THE MASTERS
// ═══════════════════════════════════════════════
const CONFIG = {
  tournamentId: "401811941", // The Masters 2026
  eventName: "The Masters",
  bettors: ["Dave","TJ","Billy","Nick","Ryan","Alex"],
   picks: {
    Dave  : ["Scottie Scheffler", "Collin Morikawa", "Justin Rose", "Corey Conners"],
    Billy : ["Ludvig Åberg", "Sepp Straka", "Chris Gotterup", "Tyrrell Hatton"],
    Nick  : ["Bryson DeChambeau", "Robert MacIntyre", "Min Woo Lee", "Jordan Spieth"],
    Alex  : ["Tommy Fleetwood", "Matt Fitzpatrick", "Akshay Bhatia", "J.J. Spaun"],
    Ryan  : ["Jon Rahm", "Xander Schauffele", "Hideki Matsuyama", "Si Woo Kim"],
    TJ    : ["Rory McIlroy", "Cameron Young", "Brooks Koepka", "Viktor Hovland"]
  },
  alts: {
    Dave  : "Jason Day",
    Billy : "Harris English",
    Nick  : "Patrick Cantlay",
    Alex  : "Sam Burns",
    Ryan  : "Justin Thomas",
    TJ    : "Wyndham Clark"
  },
  // Points per category (winner takes all, ties split)
  points: { R1: 12, R2: 12, R3: 12, R4: 12, Overall: 12, Winner: 12 },
  refreshInterval: 60, // seconds
  // Bettor colors
  colors: {
    Dave:  { bg: "#6CABDD", text: "#ffffff" },
    TJ:    { bg: "#006F71", text: "#ffffff" },
    Billy: { bg: "#7d3c98", text: "#d2b4de" },
    Nick:  { bg: "#b7950b", text: "#f9e79f" },
    Ryan:    { bg: "#b03a2e", text: "#f1948a" },
    Alex:  { bg: "#1a237e", text: "#c5cae9" }
  }
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let scoreMap = {};
let countdown = CONFIG.refreshInterval;
let countdownTimer = null;
let fetching = false;

// ═══════════════════════════════════════════════
// SCORE UTILITIES
// ═══════════════════════════════════════════════
function parseRelScore(s) {
  if (!s || s === "--" || s === "-" || s === "CUT" || s === "WD") return null;
  if (s === "E") return 0;
  const n = parseInt(s.replace("+", ""));
  return isNaN(n) ? null : n;
}

function fmtRel(n) {
  if (n === null || n === undefined) return "--";
  if (n === 0) return "E";
  return n > 0 ? "+" + n : String(n);
}

function relClass(n) {
  if (n === null) return "ns";
  if (n < 0) return "under";
  if (n > 0) return "over";
  return "even";
}

function penaltyScore(roundKey, teamPlayers) {
  const teamSet = new Set(teamPlayers);
  const allPicked = new Set(Object.values(CONFIG.picks).flat());
  let worst = null;
  allPicked.forEach(name => {
    if (teamSet.has(name)) return;
    const info = scoreMap[name];
    if (!info || info.isCut || info.isWD) return;
    const val = parseRelScore(info[roundKey]);
    if (val !== null && (worst === null || val > worst)) worst = val;
  });
  if (worst === null) return null;
  return worst + 2;
}

function effectiveRoundScore(player, roundKey) {
  const info = scoreMap[player];
  if (!info) return null;
  if (info.isCut || info.isWD) return null;
  const val = parseRelScore(info[roundKey]);
  return val;
}

function teamRoundTotal(bettor, roundKey) {
  const players = CONFIG.picks[bettor];
  const penaltyRounds = new Set(["r3", "r4"]);
  let total = 0;
  let hasAny = false;

  players.forEach(player => {
    const info = scoreMap[player];
    if (!info) return;

    const actual = parseRelScore(info[roundKey]);

    if (actual !== null) {
      total += actual;
      hasAny = true;
    } else if ((info.isCut || info.isWD) && penaltyRounds.has(roundKey)) {
      const pen = penaltyScore(roundKey, players);
      if (pen !== null) { total += pen; hasAny = true; }
    }
  });

  return hasAny ? total : null;
}

function teamOverallTotal(bettor) {
  const players = CONFIG.picks[bettor];
  let total = 0;
  let hasAny = false;

  players.forEach(player => {
    const info = scoreMap[player];
    if (!info) return;

    if (info.isCut || info.isWD) {
      const r1 = parseRelScore(info.r1);
      const r2 = parseRelScore(info.r2);
      if (r1 !== null) { total += r1; hasAny = true; }
      if (r2 !== null) { total += r2; hasAny = true; }
      const r3started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r3) !== null);
      const r4started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r4) !== null);
      if (r3started) { const p = penaltyScore("r3", players); if (p !== null) { total += p; hasAny = true; } }
      if (r4started) { const p = penaltyScore("r4", players); if (p !== null) { total += p; hasAny = true; } }
    } else {
      const val = parseRelScore(info.score);
      if (val !== null) { total += val; hasAny = true; }
    }
  });

  return hasAny ? total : null;
}

// ═══════════════════════════════════════════════
// POINTS CALCULATION
// ═══════════════════════════════════════════════
function isRoundComplete(roundKey) {
  const entries = Object.values(scoreMap);
  if (!entries.length) return false;
  const relevant = entries.filter(p => !p.isCut && !p.isWD && (p.r1holes ?? 0) > 0);
  if (!relevant.length) return false;
  const holesKey = roundKey + "holes";
  return relevant.every(p => (p[holesKey] ?? 0) === 18);
}

function isTournamentFinal() {
  return isRoundComplete("r4");
}

function awardPot(winners, pot) {
  if (!winners.length) return {};
  const share = Math.round((pot / winners.length) * 100) / 100;
  const result = {};
  winners.forEach(b => result[b] = share);
  return result;
}

function calcPoints() {
  const pts = {};
  CONFIG.bettors.forEach(b => {
    pts[b] = { R1: 0, R2: 0, R3: 0, R4: 0, Overall: 0, Winner: 0,
               Earned: 0, BuyIn: 0, Net: 0, Total: 0 };
  });

  const roundDefs = [
    { label: "R1", key: "r1" },
    { label: "R2", key: "r2" },
    { label: "R3", key: "r3" },
    { label: "R4", key: "r4" },
  ];

  roundDefs.forEach(({ label, key }) => {
    if (!isRoundComplete(key)) return;

    const totals = {};
    CONFIG.bettors.forEach(b => { totals[b] = teamRoundTotal(b, key); });
    const valid = Object.values(totals).filter(n => n !== null);
    if (!valid.length) return;

    const best = Math.min(...valid);
    const winners = CONFIG.bettors.filter(b => totals[b] === best);
    const share = Math.round((CONFIG.points[label] / winners.length) * 100) / 100;
    winners.forEach(b => pts[b][label] = share);
  });

  if (isTournamentFinal()) {
    const overalls = {};
    CONFIG.bettors.forEach(b => {
      let total = 0, hasAny = false;
      roundDefs.forEach(({ key }) => {
        const v = teamRoundTotal(b, key);
        if (v !== null) { total += v; hasAny = true; }
      });
      overalls[b] = hasAny ? total : null;
    });
    const validO = Object.values(overalls).filter(n => n !== null);
    if (validO.length) {
      const bestO = Math.min(...validO);
      const winnersO = CONFIG.bettors.filter(b => overalls[b] === bestO);
      const shareO = Math.round((CONFIG.points.Overall / winnersO.length) * 100) / 100;
      winnersO.forEach(b => pts[b].Overall = shareO);
    }

    const allMainPicks = new Set(Object.values(CONFIG.picks).flat().filter(n => n));
    let topPickedPlayer = null, topScore = null;
    allMainPicks.forEach(name => {
      const info = scoreMap[name];
      if (!info || info.isCut || info.isWD) return;
      const s = parseRelScore(info.score);
      if (s !== null && (topScore === null || s < topScore)) {
        topScore = s; topPickedPlayer = name;
      }
    });
    if (topPickedPlayer) {
      const bettorsWithTop = CONFIG.bettors.filter(b =>
        CONFIG.picks[b].includes(topPickedPlayer)
      );
      if (bettorsWithTop.length) {
        const shareW = Math.round((CONFIG.points.Winner / bettorsWithTop.length) * 100) / 100;
        bettorsWithTop.forEach(b => pts[b].Winner = shareW);
      }
    }
  }

  const buyIn = CONFIG.points.R1;

  CONFIG.bettors.forEach(b => {
    const earned = pts[b].R1 + pts[b].R2 + pts[b].R3 + pts[b].R4 +
                   pts[b].Overall + pts[b].Winner;
    pts[b].Earned = earned;
    pts[b].BuyIn  = buyIn;
    pts[b].Net    = Math.round((earned - buyIn) * 100) / 100;
    pts[b].Total  = earned;
  });

  return pts;
}

// ═══════════════════════════════════════════════
// ESPN FETCH
// ═══════════════════════════════════════════════
async function fetchScores() {
  const url = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
  const res  = await fetch(url);
  const data = await res.json();

  let event = data.events?.find(e => e.id === CONFIG.tournamentId);
  if (!event) event = data.events?.find(e =>
    e.status?.type?.state === "in" || e.status?.type?.state === "pre"
  );
  if (!event) event = data.events?.[0];
  if (!event) throw new Error("No event found");

  // Update event name in header
  document.getElementById("event-name").textContent = event.name || CONFIG.eventName;

  const newMap = {};
  const comp = event.competitions?.[0];
  if (!comp) throw new Error("No competition data");

  // Sort by order (leaderboard position)
  const sorted = [...(comp.competitors || [])].sort((a, b) => (a.order || 999) - (b.order || 999));

  sorted.forEach((p, idx) => {
    const name = p.athlete?.displayName;
    if (!name) return;

    // ESPN golf API has no status object — detect CUT by:
    // 1. Explicit "CUT" in score field
    // 2. Player has fewer linescore rounds than the max in the field
    //    (leaders are always in the highest round; CUT players stay at 2 rounds)
    const isWD  = p.score === "WD"  || p.score === "wd";
    const explicitCut = p.score === "CUT" || p.score === "cut";
    
    // Round 3 is in progress. Cut players have only 2 rounds of linescore data.
    // In-the-field players have 3+ rounds.
    const roundCount = p.linescores?.length ?? 0;
    const impliedCut = roundCount <= 2 && !isWD;
    
    const isCut = explicitCut || impliedCut;

    const score = isCut ? "CUT" : isWD ? "WD" : (p.score || "E");

    // Rounds: top-level linescores array, one entry per round
    const ls = p.linescores || [];
    const r1 = ls[0]?.displayValue || "--";
    const r2 = ls[1]?.displayValue || "--";
    const r3 = ls[2]?.displayValue || "--";
    const r4 = ls[3]?.displayValue || "--";
    // Store hole counts so isRoundComplete can check properly
    const r1holes = ls[0]?.linescores?.length ?? 0;
    const r2holes = ls[1]?.linescores?.length ?? 0;
    const r3holes = ls[2]?.linescores?.length ?? 0;
    const r4holes = ls[3]?.linescores?.length ?? 0;

    // Find the actual current round — last linescore that has a displayValue or hole data
    // ESPN pre-creates empty future round slots, so we skip those
    let currentRoundData = null;
    for (let i = ls.length - 1; i >= 0; i--) {
      const entry = ls[i];
      if (entry && (entry.displayValue || (entry.linescores && entry.linescores.length > 0))) {
        currentRoundData = entry;
        break;
      }
    }
    const today = (isCut || isWD || !currentRoundData) ? "--" : (currentRoundData.displayValue || "--");

    // Thru: derived from hole-by-hole data inside the current round
    // holes.length = number of holes completed by this player today
    // If 0 holes: haven't started yet
    // If 1-17 holes: currently playing, show hole number  
    // If 18 holes: finished their round today
    let thru = "--";
    if (isCut || isWD) {
      thru = "CUT";
    } else if (currentRoundData) {
      const holes = currentRoundData.linescores || [];
      if (holes.length === 0) {
        // No hole data — check if this is a completed prior round or not started
        if (ls.length > 1) {
          // Has multiple rounds — current round not started yet or no hole data
          thru = "--";
        } else {
          thru = "--";
        }
      } else if (holes.length < 18) {
        thru = String(holes.length); // on this hole right now
      } else {
        thru = "F"; // completed all 18 holes
      }
    }

    // Position from sort order (1-based)
    const pos = (isCut || isWD) ? "CUT" : String(idx + 1);

    newMap[name] = { score, today, thru, pos, r1, r2, r3, r4,
                     r1holes, r2holes, r3holes, r4holes, isCut, isWD };
  });

  return newMap;
}

// RENDER SCOREBOARD
// ═══════════════════════════════════════════════
function renderScoreboard() {
  const el  = document.getElementById("scoreboard");
  const pts = calcPoints();

  // Determine which round is currently active based on the highest round with any player data
  let activeRound = 1;
  for (let r = 4; r >= 1; r--) {
    const roundKey = "r" + r;
    const hasData = Object.values(scoreMap).some(p => 
      !p.isCut && !p.isWD && parseRelScore(p[roundKey]) !== null
    );
    if (hasData) {
      activeRound = r;
      break;
    }
  }

  const sorted = [...CONFIG.bettors].sort((a, b) => {
    const getRoundScore = (bettor) => {
      const r4 = teamRoundTotal(bettor, "r4");
      const r3 = teamRoundTotal(bettor, "r3");
      const r2 = teamRoundTotal(bettor, "r2");
      const r1 = teamRoundTotal(bettor, "r1");
      return r4 !== null ? r4 : r3 !== null ? r3 : r2 !== null ? r2 : r1;
    };
    const sa = getRoundScore(a), sb = getRoundScore(b);
    if (sa === null && sb === null) return 0;
    if (sa === null) return 1;
    if (sb === null) return -1;
    return sa - sb;
  });

  let html = '<div class="board-grid">';

  sorted.forEach(bettor => {
    const picks   = CONFIG.picks[bettor];
    const r1t_h = teamRoundTotal(bettor, "r1");
    const r2t_h = teamRoundTotal(bettor, "r2");
    const r3t_h = teamRoundTotal(bettor, "r3");
    const r4t_h = teamRoundTotal(bettor, "r4");
    const todayScore = r4t_h !== null ? r4t_h : r3t_h !== null ? r3t_h : r2t_h !== null ? r2t_h : r1t_h;
    const todayRound = "R" + activeRound;
    const overall = todayScore;
    const overallFmt = todayScore !== null ? todayRound + " " + fmtRel(todayScore) : (activeRound > 1 ? todayRound + " --" : "--");
    const overallCls = relClass(overall);

    const r1t = teamRoundTotal(bettor, "r1");
    const r2t = teamRoundTotal(bettor, "r2");
    const r3t = teamRoundTotal(bettor, "r3");
    const r4t = teamRoundTotal(bettor, "r4");

    const r1s = CONFIG.bettors.map(b => teamRoundTotal(b, "r1")).filter(n => n !== null);
    const bestR1 = r1s.length ? Math.min(...r1s) : null;

    const bColor = CONFIG.colors[bettor] || { bg: "#1a1a18", text: "#aaa" };
    html += `<div class="bettor-card">
      <div class="card-header" style="background:${bColor.bg}">
        <span class="card-name">${bettor}</span>
        <span class="card-total ${overallCls}">${overallFmt}</span>
      </div>
      <div class="card-body">`;

    picks.forEach((player, i) => {
      const info = scoreMap[player] || {};
      const isWD  = !!info.isWD;
      const isCut = !!(info.isCut || info.isWD);
      const scoreVal = isWD ? "WD" : isCut ? "CUT" : (info.score || "--");
      const scoreParsed = parseRelScore(isCut ? null : info.score);
      const cls = isCut ? "cut" : relClass(scoreParsed);
      const pos = info.pos || "--";
      const thru = info.thru || "";
      const todayVal = isCut ? "" : (info.today || "");
      const todayParsed = parseRelScore(todayVal);
      const todayCls = relClass(todayParsed);

      let holeDisplay = "";
      if (isWD) {
        holeDisplay = "WD";
      } else if (isCut) {
        holeDisplay = "CUT";
      } else if (thru === "F") {
        holeDisplay = "Finished";
      } else if (thru && thru !== "--") {
        holeDisplay = "Hole " + thru;
      }

      const todayDisplay = todayVal && todayVal !== "--"
        ? (todayParsed === 0 ? "E today" : (todayParsed > 0 ? "+" + todayParsed + " today" : todayParsed + " today"))
        : "";

      let penNote = "";
      if (isCut) {
        const pen = penaltyScore("r1", picks);
        if (pen !== null) penNote = `<span class="penalty-tag">+2 pen</span>`;
      }

      let cutPenaltyDisplay = "";
      let cutPenaltyCls = "over";
      if (isCut) {
        const r4started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r4) !== null);
        const r3started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r3) !== null);
        const pen = r4started ? penaltyScore("r4", picks)
                  : r3started ? penaltyScore("r3", picks)
                  : null;
        cutPenaltyDisplay = pen !== null ? fmtRel(pen) : "--";
        cutPenaltyCls = pen !== null ? relClass(pen) : "cut";
      }
      const primaryVal  = isCut ? cutPenaltyDisplay : (isWD ? "WD" : (todayVal && todayVal !== "--" ? todayVal : "--"));
      const primaryCls  = isCut ? cutPenaltyCls : (isWD ? "cut" : todayCls);
      const overallVal  = isCut ? "" : (isWD ? "" : (info.score && info.score !== "--" ? info.score + " overall" : ""));
      const overallCls2 = relClass(parseRelScore(info.score));

      html += `<div class="pick-row${isCut ? " cut-row" : ""}">
        <span class="pick-num">${i+1}</span>
        <div class="pick-info">
          <div class="pick-name">${player}${penNote}</div>
          <div class="pick-detail">${pos !== "--" ? pos : ""}</div>
        </div>
        <div style="text-align:right;min-width:70px">
          <div class="pick-score ${primaryCls}" style="display:block;margin-bottom:2px">${primaryVal}</div>
          <div style="font-size:11px;font-family:'DM Mono',monospace;line-height:1.6">
            ${isCut ? `<span style="color:var(--cut);font-size:10px">penalty</span>` : ""}
            ${!isCut && holeDisplay ? `<span style="color:var(--ink-mid)">${holeDisplay}</span><br>` : ""}
            ${!isCut && overallVal ? `<span class="${overallCls2}">${overallVal}</span>` : ""}
          </div>
        </div>
      </div>`;
    });

    const alt = CONFIG.alts[bettor];
    if (alt) {
      const ai = scoreMap[alt] || {};
      const altToday = ai.isCut ? "CUT" : (ai.today && ai.today !== "--" ? ai.today : "--");
      const as = altToday;
      const ac = ai.isCut ? "cut" : relClass(parseRelScore(ai.today));
      const altOverall = ai.isCut ? "" : (ai.score && ai.score !== "--" ? ai.score + " overall" : "");
      const altOverallCls = relClass(parseRelScore(ai.score));
      html += `<div class="pick-row" style="background:#f5f8f5">
        <span class="pick-num" style="color:#bbb">A</span>
        <div class="pick-info">
          <div class="pick-name" style="color:var(--ink-light);font-size:12px">${alt} <span style="font-size:10px;background:#e4f2ec;padding:1px 5px;border-radius:3px">alt</span></div>
          <div class="pick-detail">${ai.pos || "--"} · ${ai.thru || "--"}</div>
        </div>
        <div style="text-align:right;min-width:60px">
          <span class="pick-score ${ac}" style="font-size:13px;display:block">${as}</span>
          ${altOverall ? `<span style="font-size:11px;font-family:'DM Mono',monospace" class="${altOverallCls}">${altOverall}</span>` : ""}
        </div>
      </div>`;
    }

    html += `</div>
      <div class="card-rounds">
        <div class="round-cell">
          <span class="round-label">R1</span>
          <span class="round-val ${r1t !== null ? (r1t === bestR1 ? "best" : relClass(r1t)) : ""}">${r1t !== null ? fmtRel(r1t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R2</span>
          <span class="round-val ${r2t !== null ? relClass(r2t) : ""}">${r2t !== null ? fmtRel(r2t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R3</span>
          <span class="round-val ${r3t !== null ? relClass(r3t) : ""}">${r3t !== null ? fmtRel(r3t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R4</span>
          <span class="round-val ${r4t !== null ? relClass(r4t) : ""}">${r4t !== null ? fmtRel(r4t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">Cash</span>
          <span class="round-val ${pts[bettor].Net > 0 ? "best" : pts[bettor].Net < 0 ? "over" : ""}">${pts[bettor].Net > 0 ? "+$"+pts[bettor].Net : pts[bettor].Net < 0 ? "-$"+Math.abs(pts[bettor].Net) : "$0"}</span>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  html += `<div class="penalty-note">Penalty rule: CUT players score +2 beyond worst active picked non-team player that round. Top Pick bonus: $12 to bettor with highest-finishing main pick.</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER POINTS TABLE
// ═══════════════════════════════════════════════
function renderPoints() {
  const el  = document.getElementById("cash");
  const pts = calcPoints();
  const sorted = [...CONFIG.bettors].sort((a, b) => pts[b].Net - pts[a].Net);

  const r1done = isRoundComplete("r1");
  const r2done = isRoundComplete("r2");
  const r3done = isRoundComplete("r3");
  const r4done = isRoundComplete("r4");
  const done   = isTournamentFinal();

  function roundHeader(label, complete) {
    const lock = complete ? ' <span style="font-size:10px;opacity:0.5">&#x2713;</span>' : '';
    return `<th>${label}${lock} <span style="opacity:.5;font-size:10px">($12)</span></th>`;
  }

  function fmtCash(v) {
    if (!v) return '<span style="color:var(--ink-light)">—</span>';
    return `<span style="color:var(--green);font-weight:500">$${v % 1 === 0 ? v : v.toFixed(2)}</span>`;
  }

  function fmtNet(v) {
    if (v === 0) return '<span style="color:var(--ink-light)">$0</span>';
    if (v > 0)   return `<span style="color:var(--green);font-weight:500">+$${v % 1 === 0 ? v : v.toFixed(2)}</span>`;
    return `<span style="color:var(--red);font-weight:500">-$${Math.abs(v) % 1 === 0 ? Math.abs(v) : Math.abs(v).toFixed(2)}</span>`;
  }

  let html = '<div class="pts-wrap"><table class="pts-table"><thead><tr>';
  html += `<th>Bettor</th>`;
  html += roundHeader("R1", r1done);
  html += roundHeader("R2", r2done);
  html += roundHeader("R3", r3done);
  html += roundHeader("R4", r4done);
  html += roundHeader("Overall", done);
  html += `<th>Top Pick <span style="opacity:.5;font-size:10px">($12)</span></th>`;
  html += `<th>Earned</th><th>Buy-in</th><th>Net</th>`;
  html += '</tr></thead><tbody>';

  sorted.forEach((b, i) => {
    const p = pts[b];
    const rankCls = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "rank-n";
    const isWin = p.Net > 0;
    const pColor = CONFIG.colors[b] || { bg: "#1a1a18", text: "#aaa" };
    html += `<tr class="${isWin ? "pts-win" : ""}" style="border-left: 4px solid ${pColor.bg}">
      <td><span class="rank-badge ${rankCls}">${i+1}</span>${b}</td>
      <td>${fmtCash(p.R1)}</td>
      <td>${fmtCash(p.R2)}</td>
      <td>${fmtCash(p.R3)}</td>
      <td>${fmtCash(p.R4)}</td>
      <td>${fmtCash(p.Overall)}</td>
      <td>${fmtCash(p.Winner)}</td>
      <td style="font-weight:500">$${p.Earned || 0}</td>
      <td style="color:var(--ink-light)">$${p.BuyIn || 0}</td>
      <td class="pts-total-col">${fmtNet(p.Net)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';

  html += `<p style="font-size:12px;color:var(--ink-light);margin-top:10px;font-family:'DM Mono',monospace">
    $12 buy-in &nbsp;·&nbsp; $12 to lowest team total each round · Overall paid on final result · ties split evenly
  </p>`;

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER TEAM SCORES
// ═══════════════════════════════════════════════
function renderTeamScores() {
  const el = document.getElementById("teamscores");
  if (!el) return;

  let html = "";

  CONFIG.bettors.forEach(bettor => {
    const picks = CONFIG.picks[bettor];
    const r1t = teamRoundTotal(bettor, "r1");
    const r2t = teamRoundTotal(bettor, "r2");
    const r3t = teamRoundTotal(bettor, "r3");
    const r4t = teamRoundTotal(bettor, "r4");

    let overallParts = [r1t, r2t, r3t, r4t].filter(v => v !== null);
    const overall = overallParts.length ? overallParts.reduce((a,b) => a+b, 0) : null;

    const tsColor = CONFIG.colors[bettor] || { bg: "#1a1a18", text: "#aaa" };
    html += `<div class="ts-wrap">
      <div class="ts-bettor-header" style="background:${tsColor.bg}">
        <span class="ts-bettor-name">${bettor}</span>
        <span class="ts-bettor-total" style="color:${tsColor.text}">${overall !== null ? fmtRel(overall) + " overall" : "--"}</span>
      </div>
      <table class="ts-table">
        <thead><tr>
          <th>Player</th>
          <th>R1</th><th>R2</th><th>R3</th><th>R4</th>
          <th class="ts-total-col">Total</th>
        </tr></thead>
        <tbody>`;

    picks.forEach(player => {
      const info = scoreMap[player] || {};
      const isCut = info.isCut || info.isWD;
      const r1 = info.r1 || "--";
      const r2 = info.r2 || "--";
      const r3hasStarted = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r3) !== null);
      const r4hasStarted = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r4) !== null);
      const r3pen = (isCut && r3hasStarted) ? penaltyScore("r3", picks) : null;
      const r4pen = (isCut && r4hasStarted) ? penaltyScore("r4", picks) : null;
      const r3disp = isCut
        ? (r3pen !== null ? `<span style='color:#c0392b;font-weight:500'>${fmtRel(r3pen)}</span><span style='color:var(--cut);font-size:10px;margin-left:3px'>pen</span>` : "<span style='color:var(--cut)'>--</span>")
        : (info.r3 || "--");
      const r4disp = isCut
        ? (r4pen !== null ? `<span style='color:#c0392b;font-weight:500'>${fmtRel(r4pen)}</span><span style='color:var(--cut);font-size:10px;margin-left:3px'>pen</span>` : "<span style='color:var(--cut)'>--</span>")
        : (info.r4 || "--");

      const r1v = parseRelScore(info.r1);
      const r2v = parseRelScore(info.r2);
      const r3v = isCut ? r3pen : parseRelScore(info.r3);
      const r4v = isCut ? r4pen : parseRelScore(info.r4);
      const scores = [r1v, r2v, r3v, r4v].filter(v => v !== null);
      const playerTotal = scores.length ? scores.reduce((a,b) => a+b, 0) : null;
      const totalFmt = playerTotal !== null ? fmtRel(playerTotal) + (isCut ? `<br><span style="font-size:10px;color:#b03030">cut</span>` : "") : "--";
      const totalCls = relClass(playerTotal);

      const r1c = relClass(r1v);
      const r2c = relClass(r2v);
      const r3c = isCut ? "" : relClass(parseRelScore(info.r3));
      const r4c = isCut ? "" : relClass(parseRelScore(info.r4));

      html += `<tr class="${isCut ? "cut-row" : ""}">
        <td>${player}${isCut ? ' <span style="font-size:10px;background:#fdecea;color:#b03030;padding:1px 4px;border-radius:3px;font-weight:500">CUT</span>' : ""}</td>
        <td class="${r1c}">${r1}</td>
        <td class="${r2c}">${r2}</td>
        <td>${r3disp}</td>
        <td>${r4disp}</td>
        <td class="ts-total-col ${totalCls}">${totalFmt}</td>
      </tr>`;
    });

    html += `<tr class="ts-totals">
      <td>Team Total</td>
      <td class="${relClass(r1t)}">${r1t !== null ? fmtRel(r1t) : "--"}</td>
      <td class="${relClass(r2t)}">${r2t !== null ? fmtRel(r2t) : "--"}</td>
      <td class="${relClass(r3t)}">${r3t !== null ? fmtRel(r3t) : "--"}</td>
      <td class="${relClass(r4t)}">${r4t !== null ? fmtRel(r4t) : "--"}</td>
      <td class="ts-total-col ${relClass(overall)}">${overall !== null ? fmtRel(overall) : "--"}</td>
    </tr>`;

    html += `</tbody></table></div>`;
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER FULL FIELD
// ═══════════════════════════════════════════════
function renderLeaderboard() {
  const el = document.getElementById("leaderboard");
  const allPicks = new Set(Object.values(CONFIG.picks).flat().concat(Object.values(CONFIG.alts)));
  const ownerOf  = {};
  Object.entries(CONFIG.picks).forEach(([b, ps]) => ps.forEach(p => ownerOf[p] = b));
  Object.entries(CONFIG.alts).forEach(([b, p]) => ownerOf[p] = b);

  const players = Object.entries(scoreMap);
  if (!players.length) {
    el.innerHTML = '<p class="status-msg">No leaderboard data yet.</p>';
    return;
  }

  let html = '<div class="lb-wrap"><table class="lb-table">';
  html += `<thead><tr>
    <th>Pos</th><th>Player</th>
    <th class="right">Score</th><th class="right">Today</th>
    <th>Thru</th><th class="right">R1</th><th class="right">R2</th><th class="right">R3</th><th class="right">R4</th>
  </tr></thead><tbody>`;

  players.forEach(([name, info]) => {
    const tracked = allPicks.has(name);
    const owner   = ownerOf[name];
    const sc = parseRelScore(info.score);
    const td = parseRelScore(info.today);
    const isCut = info.isCut || info.isWD;

    const ownerColor = owner ? (CONFIG.colors[owner] || { bg: "#1a1a18", text: "#fff" }) : null;
    const nameStyle = ownerColor ? `style="color:${ownerColor.bg};font-weight:600"` : "";
    const pillStyle = ownerColor ? `style="background:${ownerColor.bg};color:#fff"` : "";
    html += `<tr class="${tracked ? "tracked" : ""}${isCut ? " cut-row" : ""}">
      <td class="muted">${info.pos || "—"}</td>
      <td><span ${nameStyle}>${name}</span>${owner ? `<span class="owner-pill" ${pillStyle}>${owner}</span>` : ""}</td>
      <td class="mono right ${relClass(sc)}">${info.score || "--"}</td>
      <td class="mono right ${relClass(td)}">${info.today || "--"}</td>
      <td class="muted">${info.thru || "--"}</td>
      <td class="mono right muted">${info.r1 || "--"}</td>
      <td class="mono right muted">${info.r2 || "--"}</td>
      <td class="mono right muted">${info.r3 || "--"}</td>
      <td class="mono right muted">${info.r4 || "--"}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// MAIN REFRESH LOOP
// ═══════════════════════════════════════════════
async function refresh() {
  if (fetching) return;
  fetching = true;

  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Loading...";
  document.getElementById("status-msg").textContent = "";

  try {
    scoreMap = await fetchScores();
    renderScoreboard();
    renderPoints();
    renderTeamScores();
    renderLeaderboard();
    const now = new Date();
    document.getElementById("last-update").textContent =
      now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    document.getElementById("live-indicator").textContent = "LIVE";
    resetCountdown();
  } catch(e) {
    document.getElementById("status-msg").textContent = "Error fetching scores: " + e.message;
    document.getElementById("status-msg").classList.add("error");
    document.getElementById("live-indicator").textContent = "ERROR";
  } finally {
    fetching = false;
    btn.disabled = false;
    btn.textContent = "Refresh";
  }
}

function resetCountdown() {
  countdown = CONFIG.refreshInterval;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    document.getElementById("countdown").textContent = countdown + "s";
    if (countdown <= 0) {
      clearInterval(countdownTimer);
      refresh();
    }
  }, 1000);
}

function showTab(id) {
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.getAttribute("onclick").includes("'" + id + "'"))
  );
  document.querySelectorAll(".section").forEach(s =>
    s.classList.toggle("active", s.id === id)
  );
}

// ── BOOT ──
refresh();
</script>
</body>
</html>
