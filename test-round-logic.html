<!DOCTYPE html>
<html>
<head><title>Round Logic Tests</title></head>
<body>
<h2>Round Logic Unit Tests</h2>
<pre id="output"></pre>
<script>
// ═══════════════════════════════════════════════
// Minimal reproduction of scoring functions from valero.html
// ═══════════════════════════════════════════════
let scoreMap = {};

function parseRelScore(s) {
  if (!s || s === "--" || s === "-" || s === "CUT" || s === "WD") return null;
  if (s === "E") return 0;
  const n = parseInt(s.replace("+", ""));
  return isNaN(n) ? null : n;
}

// Exact copy of isRoundComplete from valero.html
function isRoundComplete(roundKey) {
  const entries = Object.values(scoreMap);
  if (!entries.length) return false;

  const active = entries.filter(p => !p.isCut && !p.isWD);
  if (!active.length) return false;

  const holesKey = roundKey + "holes";
  const roundOrder = ["r1", "r2", "r3", "r4"];
  const idx = roundOrder.indexOf(roundKey);

  // Check 1: all active players have 18 holes for this round
  if (active.every(p => (p[holesKey] ?? 0) === 18)) return true;

  // All active players must have a score for this round for checks 2 & 3
  const allHaveScore = active.every(p => parseRelScore(p[roundKey]) !== null);
  if (!allHaveScore) return false;

  // Check 2: a later round has any data (scores or holes)
  for (let i = idx + 1; i < roundOrder.length; i++) {
    const laterKey = roundOrder[i];
    const laterHolesKey = laterKey + "holes";
    const laterHasData = active.some(p =>
      parseRelScore(p[laterKey]) !== null || (p[laterHolesKey] ?? 0) > 0
    );
    if (laterHasData) return true;
  }

  // Check 3: latest round with scores AND all players show "F"
  const isLatestRound = !roundOrder.slice(idx + 1).some(laterKey =>
    active.some(p => parseRelScore(p[laterKey]) !== null)
  );
  if (isLatestRound && active.every(p => p.thru === "F")) return true;

  return false;
}

function isTournamentFinal() {
  return isRoundComplete("r4");
}

// ═══════════════════════════════════════════════
// Test runner
// ═══════════════════════════════════════════════
const results = [];
let passed = 0, failed = 0;

function assert(condition, name) {
  if (condition) {
    results.push("PASS: " + name);
    passed++;
  } else {
    results.push("FAIL: " + name);
    failed++;
  }
}

// ═══════════════════════════════════════════════
// Test 1: Empty scoreMap
// ═══════════════════════════════════════════════
scoreMap = {};
assert(!isRoundComplete("r1"), "Empty scoreMap → R1 not complete");
assert(!isRoundComplete("r2"), "Empty scoreMap → R2 not complete");
assert(!isRoundComplete("r3"), "Empty scoreMap → R3 not complete");
assert(!isTournamentFinal(), "Empty scoreMap → tournament not final");

// ═══════════════════════════════════════════════
// Test 2: R1 complete (all 18 holes), R2 in progress
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r1holes: 18, r2holes: 9, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "9" },
  "Player B": { r1: "+1", r2: "E",  r1holes: 18, r2holes: 12, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "12" },
  "Player C": { r1: "E",  r2: "+2", r1holes: 18, r2holes: 18, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
};
assert(isRoundComplete("r1"), "All 18 holes R1 → R1 complete");
assert(!isRoundComplete("r2"), "Mixed holes R2 + not all thru=F → R2 NOT complete");
assert(!isRoundComplete("r3"), "No R3 data → R3 NOT complete");

// ═══════════════════════════════════════════════
// Test 3: R3 in progress — players on course
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r1holes: 18, r2holes: 18, r3holes: 14, r4holes: 0, isCut: false, isWD: false, thru: "14" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r1holes: 18, r2holes: 18, r3holes: 10, r4holes: 0, isCut: false, isWD: false, thru: "10" },
  "Player C": { r1: "E",  r2: "+2", r3: "E",  r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player D": { r1: "+5", r2: "+6", r3: "--", r1holes: 18, r2holes: 18, r3holes: 0, r4holes: 0, isCut: true, isWD: false, thru: "CUT" },
};
assert(isRoundComplete("r1"), "R1 complete");
assert(isRoundComplete("r2"), "R2 complete");
assert(!isRoundComplete("r3"), "R3 NOT complete (players still on course, not all thru=F)");
assert(!isTournamentFinal(), "Tournament not final");

// ═══════════════════════════════════════════════
// Test 4: R3 JUST ENDED — all show F, but R4 hasn't started
// ESPN may have dropped hole data. THIS IS THE KEY BUG SCENARIO.
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player C": { r1: "E",  r2: "+2", r3: "E",  r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player D": { r1: "+5", r2: "+6", r3: "--", r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: true, isWD: false, thru: "CUT" },
};
assert(isRoundComplete("r1"), "R1 complete (all have score, R3 has scores proving R1 done)");
assert(isRoundComplete("r2"), "R2 complete (all have score, R3 has scores proving R2 done)");
assert(isRoundComplete("r3"), "R3 complete — all show thru=F, R3 is latest round with scores");
assert(!isRoundComplete("r4"), "R4 not started");
assert(!isTournamentFinal(), "Tournament not final");

// ═══════════════════════════════════════════════
// Test 5: R3 just ended — hole data still present for R3
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player D": { r1: "+5", r2: "+6", r3: "--", r1holes: 18, r2holes: 18, r3holes: 0, r4holes: 0, isCut: true, isWD: false, thru: "CUT" },
};
assert(isRoundComplete("r3"), "R3 complete (all 18 holes)");
assert(!isRoundComplete("r4"), "R4 not started");

// ═══════════════════════════════════════════════
// Test 6: Full tournament complete
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r4: "-4", r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 18, isCut: false, isWD: false, thru: "F" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r4: "-1", r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 18, isCut: false, isWD: false, thru: "F" },
  "Player D": { r1: "+5", r2: "+6", r3: "--", r4: "--", r1holes: 18, r2holes: 18, r3holes: 0, r4holes: 0, isCut: true, isWD: false, thru: "CUT" },
};
assert(isRoundComplete("r4"), "R4 complete");
assert(isTournamentFinal(), "Tournament IS final");

// ═══════════════════════════════════════════════
// Test 7: WD player ignored
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r1holes: 18, r2holes: 18, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player B": { r1: "+1", r2: "WD", r1holes: 18, r2holes: 5, r3holes: 0, r4holes: 0, isCut: false, isWD: true, thru: "CUT" },
};
assert(isRoundComplete("r1"), "R1 complete (WD ignored)");
assert(isRoundComplete("r2"), "R2 complete (only Player A active, has 18 + thru=F)");

// ═══════════════════════════════════════════════
// Test 8: 60/61 done, one still playing — NOT complete
// ═══════════════════════════════════════════════
scoreMap = {};
for (let i = 0; i < 60; i++) {
  scoreMap["Player " + i] = {
    r1: "-" + (i % 5), r2: "+" + (i % 3), r3: "E",
    r1holes: 18, r2holes: 18, r3holes: 18, r4holes: 0,
    isCut: false, isWD: false, thru: "F"
  };
}
scoreMap["LastGuy"] = {
  r1: "+2", r2: "+1", r3: "-1",
  r1holes: 18, r2holes: 18, r3holes: 16, r4holes: 0,
  isCut: false, isWD: false, thru: "16"
};
assert(!isRoundComplete("r3"), "R3 NOT complete — LastGuy on hole 16, thru=16");

// ═══════════════════════════════════════════════
// Test 9: R3 ongoing — all have scores but NOT all thru=F
// Should NOT falsely trigger check 3
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "F" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r1holes: 0, r2holes: 0, r3holes: 0, r4holes: 0, isCut: false, isWD: false, thru: "12" },
};
assert(!isRoundComplete("r3"), "R3 NOT complete — Player B thru=12 (still playing)");

// ═══════════════════════════════════════════════
// Test 10: R2 done, R3 in progress — ESPN dropped R1/R2 holes, R3 has holes
// ═══════════════════════════════════════════════
scoreMap = {
  "Player A": { r1: "-3", r2: "-1", r3: "-2", r1holes: 0, r2holes: 0, r3holes: 14, r4holes: 0, isCut: false, isWD: false, thru: "14" },
  "Player B": { r1: "+1", r2: "E",  r3: "+1", r1holes: 0, r2holes: 0, r3holes: 10, r4holes: 0, isCut: false, isWD: false, thru: "10" },
};
assert(isRoundComplete("r1"), "R1 complete — later rounds have data");
assert(isRoundComplete("r2"), "R2 complete — R3 has scores");
assert(!isRoundComplete("r3"), "R3 NOT complete — not all thru=F");

// ═══════════════════════════════════════════════
// Output
// ═══════════════════════════════════════════════
const summary = `\n${"=".repeat(50)}\n${passed} passed, ${failed} failed out of ${passed + failed} tests\n${"=".repeat(50)}`;
results.push(summary);
document.getElementById("output").textContent = results.join("\n");

if (failed > 0) {
  document.getElementById("output").style.color = "red";
} else {
  document.getElementById("output").style.color = "green";
}
</script>
</body>
</html>
