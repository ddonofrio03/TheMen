<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Men — The Open Championship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #6a2230;
    --navy-deep: #4a141f;
    --navy-mid: #8a3a46;
    --navy-pale: #f8eeee;
    --navy-line: #e4cfd0;
    --gold: #c6a24a;
    --gold-light: #f4e7c6;
    --cream: #fdfcf7;
    --ink: #1a1a24;
    --ink-mid: #3a3f55;
    --ink-light: #7a8090;
    --border: #d8dde6;
    --surface: #f4f6fa;
    --white: #ffffff;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --green: #2d6a4f;
    --cut: #9a9a94;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy-deep);
    color: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* The Open logo */
  .event-logo {
    /* The mark is a landscape lockup, so height drives the size and width
       follows; the old 56x56 square squashed it. The white plate stays -- the
       PNG is transparent and its type is near-black on a dark header. */
    width: auto;
    height: 56px;
    flex-shrink: 0;
    background: var(--white);
    border-radius: 4px;
    padding: 4px;
  }

  .wordmark-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .wordmark-event {
    font-size: 12px;
    font-weight: 300;
    color: #a8b6d6;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
  }

  .live-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--navy-mid);
    border-radius: 4px;
    background: transparent;
    color: #a8b6d6;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--white); }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #7a8aaa;
  }

  /* ── COUNTDOWN BAR ── */
  .countdown-bar {
    background: var(--navy);
    border-bottom: 1px solid var(--navy-mid);
    padding: 4px 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #7a8aaa;
  }

  #countdown { color: #a8b6d6; }

  /* ── NAME WARNING ── */
  .name-warning {
    max-width: 1100px;
    margin: 12px auto 0;
    padding: 10px 16px;
    background: #fff7e6;
    border: 1px solid #ffd97d;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #7a5520;
  }
  .name-warning strong { font-weight: 600; color: #5a3f10; }

  /* ── TABS ── */
  .tabs-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: none;
    background: none;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: var(--ink-mid); }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 60px;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ── STATUS BAR ── */
  .status-msg {
    font-size: 13px;
    color: var(--ink-light);
    padding: 12px 0 20px;
    font-family: 'DM Mono', monospace;
  }

  .status-msg.error { color: var(--red); }

  /* ── SCOREBOARD GRID ── */
  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  .bettor-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(28,44,91,0.04);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .card-total {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
  }

  .card-total.under { color: #6be0a8; }
  .card-total.over  { color: #ff8080; }
  .card-total.even  { color: #fff; }

  .card-body { padding: 0; }

  .pick-row {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .pick-row:last-child { border-bottom: none; }

  .pick-row.cut-row { opacity: 0.75; background: var(--red-light); }
  .pick-row.cut-row .pick-name { color: #b03030; }
  .pick-row.cut-row .pick-score { color: #b03030; }

  .pick-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-light);
    min-width: 14px;
  }

  .pick-info { flex: 1; min-width: 0; }

  .pick-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pick-detail {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .pick-score {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    min-width: 38px;
    text-align: right;
  }

  .pick-score.under { color: var(--green); }
  .pick-score.over  { color: var(--red); }
  .pick-score.even  { color: var(--ink-mid); }
  .pick-score.cut   { color: var(--cut); font-size: 12px; }
  .pick-score.ns    { color: var(--ink-light); }

  .penalty-tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--gold-light);
    color: #7a5a10;
    font-family: 'DM Mono', monospace;
    margin-left: 4px;
  }

  /* ── ROUND ROW ── */
  .card-rounds {
    display: flex;
    border-top: 2px solid var(--border);
    background: var(--navy-pale);
  }

  .round-cell {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-right: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  .round-cell:last-child { border-right: none; }

  .round-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-light);
    display: block;
  }

  .round-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
    display: block;
    margin-top: 1px;
  }

  .round-val.under { color: var(--green); }
  .round-val.over  { color: var(--red); }
  .round-val.best  { color: var(--gold); font-weight: 600; }

  /* ── POINTS TABLE ── */
  .pts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .pts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .pts-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: var(--navy-pale);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  .pts-table th:first-child { text-align: left; }

  .pts-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-mid);
  }

  .pts-table tr:last-child td { border-bottom: none; }

  .pts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink);
  }

  .pts-total-col {
    font-weight: 600 !important;
    color: var(--ink) !important;
    font-size: 15px !important;
  }

  .pts-win {
    background: #f0f5ff !important;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    margin-right: 8px;
  }

  .rank-1 { background: var(--gold-light); color: var(--gold); }
  .rank-2 { background: #f0f0ee; color: var(--ink-mid); }
  .rank-3 { background: #fdf0ee; color: #b0634a; }
  .rank-n { background: var(--surface); color: var(--ink-light); }

  /* ── TEAM SCORES ── */
  .ts-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .ts-bettor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--white);
  }

  .ts-bettor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .ts-bettor-total {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #aaa;
  }

  .ts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }

  .ts-table th {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: var(--navy-pale);
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  .ts-table th:first-child { text-align: left; width: 35%; }
  .ts-table th:last-child { background: #dde5f3; }

  .ts-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #e8ecf3;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
    color: var(--ink-mid);
  }

  .ts-table td:first-child {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 13px;
  }

  .ts-table tr:last-child td { border-bottom: none; }
  .ts-table tr.ts-totals td {
    background: var(--navy-pale);
    font-weight: 600;
    border-top: 2px solid var(--border);
    border-bottom: none;
  }
  .ts-table tr.ts-totals td:first-child { color: var(--ink-mid); }
  .ts-table td.ts-total-col { background: #dde5f3; font-weight: 600; }
  .ts-table th.ts-total-col { background: #dde5f3; }
  .ts-table tr.cut-row td:first-child { color: #b03030; }

  /* ── LEADERBOARD ── */
  .lb-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .lb-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .lb-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    background: var(--navy-pale);
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .lb-table th.right { text-align: right; }

  .lb-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #e8ecf3;
    color: var(--ink);
    font-size: 13px;
  }

  .lb-table td.mono { font-family: 'DM Mono', monospace; }
  .lb-table td.right { text-align: right; }
  .lb-table td.muted { color: var(--ink-light); font-family: 'DM Mono', monospace; }

  .lb-table tr.tracked { background: #f0f5ff; }
  .lb-table tr.tracked td:nth-child(2) { font-weight: 500; }
  .lb-table tr.cut-row { opacity: 0.7; background: var(--red-light); }

  .owner-pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--navy-pale);
    color: var(--navy);
    font-family: 'DM Mono', monospace;
    margin-left: 6px;
    font-weight: 500;
  }

  /* ── PENALTY NOTE ── */
  .penalty-note {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--gold-light);
    border: 1px solid #e8d088;
    border-radius: 6px;
    font-size: 12px;
    color: #5a4220;
    font-family: 'DM Mono', monospace;
  }

  /* ── SCORE-RELATIVE COLOR HELPERS ── */
  .under { color: var(--green); }
  .over  { color: var(--red); }
  .even  { color: var(--ink-mid); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; }
    main, .tabs-wrap { padding-left: 16px; padding-right: 16px; }
    .board-grid { grid-template-columns: 1fr; }
    .wordmark-event { display: none; }
    .event-logo { height: 44px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wordmark">
      <img class="event-logo" src="assets/theopen-2026.png" alt="The Open 2026 · Royal Birkdale">
      <div>
        <span class="wordmark-title">The Men</span><br>
        <span class="wordmark-event" id="event-name">The Open · Royal Birkdale</span>
      </div>
    </div>
    <div class="header-right">
      <span class="live-dot" id="live-indicator">FINAL</span>
      <span class="last-update" id="last-update">--</span>
      <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
    </div>
  </div>
</header>

<div class="countdown-bar">
  Next auto-refresh in <span id="countdown">60s</span>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('scoreboard')">Scoreboard</button>
    <button class="tab" onclick="showTab('teamscores')">Team Scores</button>
    <button class="tab" onclick="showTab('cash')">Cash Won</button>
    <button class="tab" onclick="showTab('leaderboard')">Full Field</button>
  </div>
</div>

<main>
  <div id="status-msg" class="status-msg"></div>
  <div id="name-warning" class="name-warning" style="display:none"></div>

  <div id="scoreboard" class="section active"></div>
  <div id="cash" class="section"></div>
  <div id="teamscores" class="section"></div>
  <div id="leaderboard" class="section"></div>
</main>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let scoreMap = {};
let eventMeta = { state: null, completed: false }; // ESPN event status
let countdown = CONFIG.refreshInterval;
let countdownTimer = null;
let fetching = false;

function bettors() { return CONFIG.bettors; }
function picksFor(b) { return (CONFIG.picks[b] || []).filter(n => n); }
function altFor(b) { return CONFIG.alts[b] || null; }
function allDrafted() {
  const s = new Set();
  bettors().forEach(b => {
    picksFor(b).forEach(p => s.add(p));
    const a = altFor(b);
    if (a) s.add(a);
  });
  return s;
}

// ═══════════════════════════════════════════════
// SCORE UTILITIES
// ═══════════════════════════════════════════════
function parseRelScore(s) {
  if (!s || s === "--" || s === "-" || s === "CUT" || s === "WD") return null;
  if (s === "E") return 0;
  const n = parseInt(String(s).replace("+", ""));
  return isNaN(n) ? null : n;
}

function fmtRel(n) {
  if (n === null || n === undefined) return "--";
  if (n === 0) return "E";
  return n > 0 ? "+" + n : String(n);
}

function relClass(n) {
  if (n === null) return "ns";
  if (n < 0) return "under";
  if (n > 0) return "over";
  return "even";
}

// Penalty: cut/WD player on R3/R4 = (worst non-team active picked player that round) + 2.
// Penalty pool is the picks of the CURRENT group only.
function penaltyScore(roundKey, teamPlayers) {
  const teamSet = new Set(teamPlayers);
  // Pool = every bettor's PICKS (starters), minus this cut player's own team.
  // Alts are deliberately excluded: an alt never contributes to a team's round
  // total, so it must not set the penalty baseline either. The penalty is +2
  // over the worst active starter that isn't yours.
  let worst = null;
  bettors().forEach(b => {
    picksFor(b).forEach(name => {
      if (teamSet.has(name)) return;
      const info = scoreMap[name];
      if (!info || info.isCut || info.isWD) return;
      const val = parseRelScore(info[roundKey]);
      if (val !== null && (worst === null || val > worst)) worst = val;
    });
  });
  if (worst === null) return null;
  return worst + 2;
}

function teamRoundTotal(bettor, roundKey) {
  const players = picksFor(bettor);
  const penaltyRounds = new Set(["r3", "r4"]);
  let total = 0;
  let hasAny = false;

  players.forEach(player => {
    const info = scoreMap[player];
    if (!info) return;

    const actual = parseRelScore(info[roundKey]);

    if (actual !== null) {
      total += actual;
      hasAny = true;
    } else if ((info.isCut || info.isWD) && penaltyRounds.has(roundKey)) {
      const pen = penaltyScore(roundKey, players);
      if (pen !== null) { total += pen; hasAny = true; }
    }
  });

  return hasAny ? total : null;
}

// ═══════════════════════════════════════════════
// ROUND COMPLETION
// ═══════════════════════════════════════════════
// Multi-signal detection so the page works whether ESPN's
// per-hole data is complete or not, and whether the tournament
// is live or already final.
function isRoundComplete(roundKey) {
  const entries = Object.values(scoreMap);
  if (!entries.length) return false;

  // "In the field" = not cut/WD and has actually teed off. Detect this from the
  // R1 round total (displayValue), which ESPN keeps for every round — NOT from
  // per-hole linescores, which ESPN drops for earlier rounds once a new round
  // begins. Gating on per-hole data made `active` empty after R2, stalling every
  // round's completion and its cash payout.
  const hasStarted = p => parseRelScore(p.r1) !== null || (p.r1holes ?? 0) > 0;
  const active = entries.filter(p => !p.isCut && !p.isWD && hasStarted(p));
  if (!active.length) return false;

  const holesKey = roundKey + "holes";
  const roundIdx = parseInt(roundKey[1]);
  const nextRoundIdx = roundIdx + 1;
  const nextHolesKey = "r" + nextRoundIdx + "holes";
  const nextRoundKey = "r" + nextRoundIdx;

  // Signal 0: the cut has been made (some players marked CUT) => R1 and R2 are final.
  if ((roundKey === "r1" || roundKey === "r2") && entries.some(p => p.isCut)) return true;

  // Signal 1: any active player has data in the next round => this round is done.
  if (nextRoundIdx <= 4) {
    const nextStarted = active.some(p =>
      (p[nextHolesKey] ?? 0) > 0 || parseRelScore(p[nextRoundKey]) !== null
    );
    if (nextStarted) return true;
  }

  // Signal 2: every active player finished 18 holes this round.
  if (active.every(p => (p[holesKey] ?? 0) === 18)) return true;

  // Signal 3 (R4 only): event status reports the tournament is post/completed.
  if (roundKey === "r4" && eventMeta.completed) return true;

  // Signal 4: nearly every active player finished 18 holes (>= all-but-one and >= 90%).
  // Handles a lone straggler / unflagged WD / ESPN reporting 17 of 18 holes that
  // would otherwise stall a round that is really over.
  {
    const eighteen = active.filter(p => (p[holesKey] ?? 0) === 18).length;
    if (eighteen >= active.length - 1 && eighteen / active.length >= 0.9) return true;
  }

  return false;
}

function isTournamentFinal() {
  return isRoundComplete("r4");
}

function calcPoints() {
  const pts = {};
  bettors().forEach(b => {
    pts[b] = { R1: 0, R2: 0, R3: 0, R4: 0, Overall: 0, Winner: 0,
               Earned: 0, BuyIn: 0, Net: 0, Total: 0 };
  });

  const roundDefs = [
    { label: "R1", key: "r1" },
    { label: "R2", key: "r2" },
    { label: "R3", key: "r3" },
    { label: "R4", key: "r4" }
  ];

  roundDefs.forEach(({ label, key }) => {
    if (!isRoundComplete(key)) return;

    const totals = {};
    bettors().forEach(b => { totals[b] = teamRoundTotal(b, key); });
    const valid = Object.values(totals).filter(n => n !== null);
    if (!valid.length) return;

    const best = Math.min(...valid);
    const winners = bettors().filter(b => totals[b] === best);
    const share = Math.round((CONFIG.points[label] / winners.length) * 100) / 100;
    winners.forEach(b => pts[b][label] = share);
  });

  if (isTournamentFinal()) {
    const overalls = {};
    bettors().forEach(b => {
      let total = 0, hasAny = false;
      roundDefs.forEach(({ key }) => {
        const v = teamRoundTotal(b, key);
        if (v !== null) { total += v; hasAny = true; }
      });
      overalls[b] = hasAny ? total : null;
    });
    const validO = Object.values(overalls).filter(n => n !== null);
    if (validO.length) {
      const bestO = Math.min(...validO);
      const winnersO = bettors().filter(b => overalls[b] === bestO);
      const shareO = Math.round((CONFIG.points.Overall / winnersO.length) * 100) / 100;
      winnersO.forEach(b => pts[b].Overall = shareO);
    }

    const allMain = allDrafted();
    let topPlayer = null, topScore = null;
    allMain.forEach(name => {
      const info = scoreMap[name];
      if (!info || info.isCut || info.isWD) return;
      const s = parseRelScore(info.score);
      if (s !== null && (topScore === null || s < topScore)) {
        topScore = s; topPlayer = name;
      }
    });
    if (topPlayer) {
      const winnersTop = bettors().filter(b => picksFor(b).includes(topPlayer));
      if (winnersTop.length) {
        const shareW = Math.round((CONFIG.points.Winner / winnersTop.length) * 100) / 100;
        winnersTop.forEach(b => pts[b].Winner = shareW);
      }
    }
  }

  const buyIn = CONFIG.buyIn ?? CONFIG.points.R1;

  bettors().forEach(b => {
    const earned = pts[b].R1 + pts[b].R2 + pts[b].R3 + pts[b].R4 +
                   pts[b].Overall + pts[b].Winner;
    pts[b].Earned = earned;
    pts[b].BuyIn  = buyIn;
    pts[b].Net    = Math.round((earned - buyIn) * 100) / 100;
    pts[b].Total  = earned;
  });

  return pts;
}

// ═══════════════════════════════════════════════
// ESPN FETCH
// ═══════════════════════════════════════════════
function realRoundCount(ls) {
  // Count rounds that have real data (a parseable round score or per-hole data).
  // ESPN preallocates future-round slots and fills the unplayed rounds of CUT
  // players with placeholder displayValues like "-" / "--", which are truthy.
  // Counting those made cut players look like they'd played 3-4 rounds, so the
  // round-count cut inference never fired once R3 began and missed cuts kept
  // showing as active. Validate the round score with parseRelScore (treats
  // "-"/"--"/"CUT"/"WD"/"" as no data) — the same convention used everywhere
  // else in this file. Stop at the first round with no real data.
  let count = 0;
  for (const r of ls) {
    const hasData = r && (parseRelScore(r.displayValue) !== null ||
                          (r.linescores && r.linescores.length > 0));
    if (hasData) count++;
    else break;
  }
  return count;
}

async function fetchScores() {
  // ── ARCHIVED ──
  // Final leaderboard captured from ESPN and embedded in #espn-snapshot below,
  // so this page keeps working after ESPN drops the event from their API.
  const data = JSON.parse(document.getElementById("espn-snapshot").textContent);

  let event;
  if (CONFIG.tournamentId) {
    event = data.events?.find(e => e.id === CONFIG.tournamentId);
  }
  if (!event && CONFIG.tournamentName) {
    const needle = CONFIG.tournamentName.toLowerCase();
    event = data.events?.find(e => (e.name || "").toLowerCase().includes(needle));
  }
  if (!event) event = data.events?.find(e =>
    e.status?.type?.state === "in" || e.status?.type?.state === "pre"
  );
  if (!event) event = data.events?.[0];
  if (!event) throw new Error("No event found on ESPN scoreboard");

  // Capture event status for round-completion fallback
  eventMeta = {
    state: event.status?.type?.state || null,
    completed: event.status?.type?.completed === true
  };

  document.getElementById("event-name").textContent = event.name || CONFIG.eventName;

  const comp = event.competitions?.[0];
  if (!comp) throw new Error("No competition data");
  const sorted = [...(comp.competitors || [])].sort((a, b) => (a.order || 999) - (b.order || 999));

  // Authoritative hardcoded cut list (the proven rule — see CONFIG.cutList).
  const cutSet = new Set(CONFIG.cutList || []);

  // 36-hole (R1 + R2) relative-to-par total; null until both rounds are posted.
  const total36 = (p) => {
    const a = parseRelScore(p.linescores?.[0]?.displayValue);
    const b = parseRelScore(p.linescores?.[1]?.displayValue);
    return (a === null || b === null) ? null : a + b;
  };

  // Does ESPN itself mark this competitor cut (score field or status object)?
  // Token-match so we don't trip on words like "cutoff".
  const espnStatusCut = (p) => {
    if (p.score === "CUT" || p.score === "cut") return true;
    const t = p.status?.type || {};
    const hay = [t.name, t.description, t.shortDetail, t.detail, p.status?.displayValue]
      .filter(Boolean).join(" ").toLowerCase();
    return hay.split(/[^a-z]+/).includes("cut");
  };

  // ── MISSED-CUT DETECTION (cut line: low CUT_PLACES and ties) ──
  // Key off each player's FROZEN 36-hole total vs the computed cut line, so cuts
  // stay correct all weekend regardless of ESPN's round padding. A fixed score
  // threshold can't work — the line varies by event (The Open = low 70 & ties).
  const r3HasStarted = sorted.some(p =>
    parseRelScore(p.linescores?.[2]?.displayValue) !== null ||
    (p.linescores?.[2]?.linescores?.length ?? 0) > 0
  );
  const CUT_PLACES = CONFIG.cutPlaces || 70;
  const fieldNonWD = sorted.filter(p =>
    p.athlete?.displayName && !(p.score === "WD" || p.score === "wd")
  );
  // The cut is "in effect" once R2 is essentially done or R3 has begun — via any
  // of these signals so a flaky feed can't stall it, and none fire mid-Round-2.
  const r2DoneByHoles = fieldNonWD.filter(p =>
    (p.linescores?.[1]?.linescores?.length ?? 0) === 18
  ).length;
  const r2DoneByTotal = fieldNonWD.filter(p =>
    parseRelScore(p.linescores?.[1]?.displayValue) !== null
  ).length;
  const cutInEffect =
    r3HasStarted ||
    (fieldNonWD.length > 0 && r2DoneByHoles / fieldNonWD.length >= 0.85) ||
    (fieldNonWD.length > 0 && r2DoneByTotal / fieldNonWD.length >= 0.95) ||
    sorted.some(espnStatusCut);
  let cutLine = null;
  if (cutInEffect) {
    // Sort 36-hole totals ascending; the CUT_PLACES-th slot is the line, and
    // "and ties" means only players strictly worse than it miss the cut.
    const totals = fieldNonWD.map(total36).filter(v => v !== null).sort((a, b) => a - b);
    if (totals.length > CUT_PLACES) cutLine = totals[CUT_PLACES - 1];
  }

  const newMap = {};

  sorted.forEach((p, idx) => {
    const name = p.athlete?.displayName;
    if (!name) return;

    const ls = p.linescores || [];

    const isWD = p.score === "WD" || p.score === "wd";
    const explicitCut = p.score === "CUT" || p.score === "cut";

    // Authoritative hardcoded cut list — a name here is cut regardless of what
    // the live feed says. Backstop for players the cut-line rule can't resolve.
    const listCut = cutSet.has(name);

    // ESPN's own cut marker (score field or status object), when present.
    const statusCut = espnStatusCut(p);

    // Missed the cut: 36-hole total is worse than the cut line (low CUT_PLACES
    // and ties). Final once the cut is made, so it stays correct through R3/R4.
    const lineCut = cutLine !== null && !isWD && (() => {
      const v = total36(p);
      return v !== null && v > cutLine;
    })();

    const isCut = listCut || explicitCut || statusCut || lineCut;

    const score = isCut ? "CUT" : isWD ? "WD" : (p.score || "E");

    const r1 = ls[0]?.displayValue || "--";
    const r2 = ls[1]?.displayValue || "--";
    const r3 = ls[2]?.displayValue || "--";
    const r4 = ls[3]?.displayValue || "--";
    const r1holes = ls[0]?.linescores?.length ?? 0;
    const r2holes = ls[1]?.linescores?.length ?? 0;
    const r3holes = ls[2]?.linescores?.length ?? 0;
    const r4holes = ls[3]?.linescores?.length ?? 0;

    // Find the latest round with any data — that's "today" for this player.
    let currentRoundData = null;
    for (let i = ls.length - 1; i >= 0; i--) {
      const entry = ls[i];
      if (entry && (entry.displayValue || (entry.linescores && entry.linescores.length > 0))) {
        currentRoundData = entry;
        break;
      }
    }
    const today = (isCut || isWD || !currentRoundData) ? "--" : (currentRoundData.displayValue || "--");

    let thru = "--";
    if (isCut || isWD) {
      thru = "CUT";
    } else if (currentRoundData) {
      const holes = currentRoundData.linescores || [];
      if (holes.length === 0) thru = "--";
      else if (holes.length < 18) thru = String(holes.length);
      else thru = "F";
    }

    const pos = (isCut || isWD) ? "CUT" : String(idx + 1);

    newMap[name] = { score, today, thru, pos, r1, r2, r3, r4,
                     r1holes, r2holes, r3holes, r4holes, isCut, isWD };
  });

  return newMap;
}

// Find drafted names that didn't match any ESPN player in the current group.
// Show a banner so we catch typos before they silently zero a score.
function checkNameMismatches() {
  const banner = document.getElementById("name-warning");
  const drafted = allDrafted();
  if (!drafted.size) { banner.style.display = "none"; return; }

  const espnNames = new Set(Object.keys(scoreMap));
  const missing = [...drafted].filter(n => !espnNames.has(n));

  if (!missing.length) { banner.style.display = "none"; return; }

  // Try to suggest a close match for each missing name.
  const suggestions = missing.map(m => {
    const lc = m.toLowerCase();
    const best = [...espnNames].find(e => {
      const elc = e.toLowerCase();
      return elc.includes(lc) || lc.includes(elc) ||
             elc.replace(/\s/g, "") === lc.replace(/\s/g, "");
    });
    return best ? `<strong>${m}</strong> → did you mean <em>${best}</em>?` : `<strong>${m}</strong>`;
  });

  banner.innerHTML = `Drafted name${missing.length > 1 ? "s" : ""} not matched to ESPN data: ${suggestions.join(" · ")}`;
  banner.style.display = "block";
}

// ═══════════════════════════════════════════════
// RENDER: SCOREBOARD
// ═══════════════════════════════════════════════
function renderScoreboard() {
  const el  = document.getElementById("scoreboard");
  const pts = calcPoints();

  if (!bettors().some(b => picksFor(b).length)) {
    el.innerHTML = `<div class="status-msg">No picks yet. Run the draft on <a href="picks.html" style="color:var(--navy)">picks.html</a> and paste the CONFIG output into this file.</div>`;
    return;
  }

  // Active round = highest round with any data among active players
  let activeRound = 1;
  for (let r = 4; r >= 1; r--) {
    const rk = "r" + r;
    const hasData = Object.values(scoreMap).some(p =>
      !p.isCut && !p.isWD && parseRelScore(p[rk]) !== null
    );
    if (hasData) { activeRound = r; break; }
  }

  const sorted = [...bettors()].sort((a, b) => {
    const score = (bb) => {
      const r4 = teamRoundTotal(bb, "r4");
      const r3 = teamRoundTotal(bb, "r3");
      const r2 = teamRoundTotal(bb, "r2");
      const r1 = teamRoundTotal(bb, "r1");
      return r4 !== null ? r4 : r3 !== null ? r3 : r2 !== null ? r2 : r1;
    };
    const sa = score(a), sb = score(b);
    if (sa === null && sb === null) return 0;
    if (sa === null) return 1;
    if (sb === null) return -1;
    return sa - sb;
  });

  let html = '<div class="board-grid">';

  sorted.forEach(bettor => {
    const playerPicks = picksFor(bettor);
    const r1t = teamRoundTotal(bettor, "r1");
    const r2t = teamRoundTotal(bettor, "r2");
    const r3t = teamRoundTotal(bettor, "r3");
    const r4t = teamRoundTotal(bettor, "r4");
    const todayScore = r4t !== null ? r4t : r3t !== null ? r3t : r2t !== null ? r2t : r1t;
    const todayRound = "R" + activeRound;
    const overallFmt = todayScore !== null ? todayRound + " " + fmtRel(todayScore) : (activeRound > 1 ? todayRound + " --" : "--");
    const overallCls = relClass(todayScore);

    const r1s = bettors().map(b => teamRoundTotal(b, "r1")).filter(n => n !== null);
    const bestR1 = r1s.length ? Math.min(...r1s) : null;

    const bColor = CONFIG.colors[bettor] || { bg: "#1a1a18", text: "#aaa" };
    html += `<div class="bettor-card">
      <div class="card-header" style="background:${bColor.bg}">
        <span class="card-name">${bettor}</span>
        <span class="card-total ${overallCls}">${overallFmt}</span>
      </div>
      <div class="card-body">`;

    playerPicks.forEach((player, i) => {
      const info = scoreMap[player] || {};
      const isWD  = !!info.isWD;
      const isCut = !!(info.isCut || info.isWD);
      const scoreParsed = parseRelScore(isCut ? null : info.score);
      const pos = info.pos || "--";
      const thru = info.thru || "";
      const todayVal = isCut ? "" : (info.today || "");
      const todayParsed = parseRelScore(todayVal);
      const todayCls = relClass(todayParsed);

      let holeDisplay = "";
      if (isWD) holeDisplay = "WD";
      else if (isCut) holeDisplay = "CUT";
      else if (thru === "F") holeDisplay = "Finished";
      else if (thru && thru !== "--") holeDisplay = "Hole " + thru;

      let penNote = "";
      if (isCut) {
        const pen = penaltyScore("r1", playerPicks);
        if (pen !== null) penNote = `<span class="penalty-tag">+2 pen</span>`;
      }

      let cutPenaltyDisplay = "";
      let cutPenaltyCls = "over";
      if (isCut) {
        const r4started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r4) !== null);
        const r3started = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r3) !== null);
        const pen = r4started ? penaltyScore("r4", playerPicks)
                  : r3started ? penaltyScore("r3", playerPicks)
                  : null;
        cutPenaltyDisplay = pen !== null ? fmtRel(pen) : "--";
        cutPenaltyCls = pen !== null ? relClass(pen) : "cut";
      }
      const primaryVal = isCut ? cutPenaltyDisplay : (isWD ? "WD" : (todayVal && todayVal !== "--" ? todayVal : "--"));
      const primaryCls = isCut ? cutPenaltyCls : (isWD ? "cut" : todayCls);
      const overallVal = isCut ? "" : (isWD ? "" : (info.score && info.score !== "--" ? info.score + " overall" : ""));
      const overallCls2 = relClass(parseRelScore(info.score));

      html += `<div class="pick-row${isCut ? " cut-row" : ""}">
        <span class="pick-num">${i+1}</span>
        <div class="pick-info">
          <div class="pick-name">${player}${penNote}</div>
          <div class="pick-detail">${pos !== "--" ? pos : ""}</div>
        </div>
        <div style="text-align:right;min-width:70px">
          <div class="pick-score ${primaryCls}" style="display:block;margin-bottom:2px">${primaryVal}</div>
          <div style="font-size:11px;font-family:'DM Mono',monospace;line-height:1.6">
            ${isCut ? `<span style="color:var(--cut);font-size:10px">penalty</span>` : ""}
            ${!isCut && holeDisplay ? `<span style="color:var(--ink-mid)">${holeDisplay}</span><br>` : ""}
            ${!isCut && overallVal ? `<span class="${overallCls2}">${overallVal}</span>` : ""}
          </div>
        </div>
      </div>`;
    });

    const alt = altFor(bettor);
    if (alt) {
      const ai = scoreMap[alt] || {};
      const altToday = ai.isCut ? "CUT" : (ai.today && ai.today !== "--" ? ai.today : "--");
      const ac = ai.isCut ? "cut" : relClass(parseRelScore(ai.today));
      const altOverall = ai.isCut ? "" : (ai.score && ai.score !== "--" ? ai.score + " overall" : "");
      const altOverallCls = relClass(parseRelScore(ai.score));
      html += `<div class="pick-row" style="background:var(--surface)">
        <span class="pick-num" style="color:#bbb">A</span>
        <div class="pick-info">
          <div class="pick-name" style="color:var(--ink-light);font-size:12px">${alt} <span style="font-size:10px;background:var(--navy-pale);color:var(--navy);padding:1px 5px;border-radius:3px">alt</span></div>
          <div class="pick-detail">${ai.pos || "--"} · ${ai.thru || "--"}</div>
        </div>
        <div style="text-align:right;min-width:60px">
          <span class="pick-score ${ac}" style="font-size:13px;display:block">${altToday}</span>
          ${altOverall ? `<span style="font-size:11px;font-family:'DM Mono',monospace" class="${altOverallCls}">${altOverall}</span>` : ""}
        </div>
      </div>`;
    }

    html += `</div>
      <div class="card-rounds">
        <div class="round-cell">
          <span class="round-label">R1</span>
          <span class="round-val ${r1t !== null ? (r1t === bestR1 ? "best" : relClass(r1t)) : ""}">${r1t !== null ? fmtRel(r1t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R2</span>
          <span class="round-val ${r2t !== null ? relClass(r2t) : ""}">${r2t !== null ? fmtRel(r2t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R3</span>
          <span class="round-val ${r3t !== null ? relClass(r3t) : ""}">${r3t !== null ? fmtRel(r3t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">R4</span>
          <span class="round-val ${r4t !== null ? relClass(r4t) : ""}">${r4t !== null ? fmtRel(r4t) : "--"}</span>
        </div>
        <div class="round-cell">
          <span class="round-label">Cash</span>
          <span class="round-val ${pts[bettor].Net > 0 ? "best" : pts[bettor].Net < 0 ? "over" : ""}">${pts[bettor].Net > 0 ? "+$"+pts[bettor].Net : pts[bettor].Net < 0 ? "-$"+Math.abs(pts[bettor].Net) : "$0"}</span>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  html += `<div class="penalty-note">Penalty: CUT/WD picks score +2 beyond worst active picked non-team player that round. Top Pick: $12 to bettor whose drafted main pick has the lowest 72-hole score.</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER: CASH WON
// ═══════════════════════════════════════════════
function renderPoints() {
  const el  = document.getElementById("cash");
  const pts = calcPoints();
  const sorted = [...bettors()].sort((a, b) => pts[b].Net - pts[a].Net);

  const r1done = isRoundComplete("r1");
  const r2done = isRoundComplete("r2");
  const r3done = isRoundComplete("r3");
  const r4done = isRoundComplete("r4");
  const done   = isTournamentFinal();

  function roundHeader(label, complete) {
    const lock = complete ? ' <span style="font-size:10px;opacity:0.5">&#x2713;</span>' : '';
    return `<th>${label}${lock} <span style="opacity:.5;font-size:10px">($12)</span></th>`;
  }

  function fmtCash(v) {
    if (!v) return '<span style="color:var(--ink-light)">—</span>';
    return `<span style="color:var(--green);font-weight:500">$${v % 1 === 0 ? v : v.toFixed(2)}</span>`;
  }

  function fmtNet(v) {
    if (v === 0) return '<span style="color:var(--ink-light)">$0</span>';
    if (v > 0)   return `<span style="color:var(--green);font-weight:500">+$${v % 1 === 0 ? v : v.toFixed(2)}</span>`;
    return `<span style="color:var(--red);font-weight:500">-$${Math.abs(v) % 1 === 0 ? Math.abs(v) : Math.abs(v).toFixed(2)}</span>`;
  }

  let html = '<div class="pts-wrap"><table class="pts-table"><thead><tr>';
  html += `<th>Bettor</th>`;
  html += roundHeader("R1", r1done);
  html += roundHeader("R2", r2done);
  html += roundHeader("R3", r3done);
  html += roundHeader("R4", r4done);
  html += roundHeader("Overall", done);
  html += `<th>Top Pick <span style="opacity:.5;font-size:10px">($12)</span></th>`;
  html += `<th>Earned</th><th>Buy-in</th><th>Net</th>`;
  html += '</tr></thead><tbody>';

  sorted.forEach((b, i) => {
    const p = pts[b];
    const rankCls = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "rank-n";
    const isWin = p.Net > 0;
    const pColor = CONFIG.colors[b] || { bg: "#1a1a18", text: "#aaa" };
    html += `<tr class="${isWin ? "pts-win" : ""}" style="border-left: 4px solid ${pColor.bg}">
      <td><span class="rank-badge ${rankCls}">${i+1}</span>${b}</td>
      <td>${fmtCash(p.R1)}</td>
      <td>${fmtCash(p.R2)}</td>
      <td>${fmtCash(p.R3)}</td>
      <td>${fmtCash(p.R4)}</td>
      <td>${fmtCash(p.Overall)}</td>
      <td>${fmtCash(p.Winner)}</td>
      <td style="font-weight:500">$${p.Earned || 0}</td>
      <td style="color:var(--ink-light)">$${p.BuyIn || 0}</td>
      <td class="pts-total-col">${fmtNet(p.Net)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';

  html += `<p style="font-size:12px;color:var(--ink-light);margin-top:10px;font-family:'DM Mono',monospace">
    $12 buy-in &nbsp;·&nbsp; $12 to lowest team total each round · Overall paid on final result · ties split evenly
  </p>`;

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER: TEAM SCORES
// ═══════════════════════════════════════════════
function renderTeamScores() {
  const el = document.getElementById("teamscores");
  if (!el) return;

  let html = "";

  bettors().forEach(bettor => {
    const playerPicks = picksFor(bettor);
    const r1t = teamRoundTotal(bettor, "r1");
    const r2t = teamRoundTotal(bettor, "r2");
    const r3t = teamRoundTotal(bettor, "r3");
    const r4t = teamRoundTotal(bettor, "r4");

    const overallParts = [r1t, r2t, r3t, r4t].filter(v => v !== null);
    const overall = overallParts.length ? overallParts.reduce((a,b) => a+b, 0) : null;

    const tsColor = CONFIG.colors[bettor] || { bg: "#1a1a18", text: "#aaa" };
    html += `<div class="ts-wrap">
      <div class="ts-bettor-header" style="background:${tsColor.bg}">
        <span class="ts-bettor-name">${bettor}</span>
        <span class="ts-bettor-total" style="color:${tsColor.text}">${overall !== null ? fmtRel(overall) + " overall" : "--"}</span>
      </div>
      <table class="ts-table">
        <thead><tr>
          <th>Player</th>
          <th>R1</th><th>R2</th><th>R3</th><th>R4</th>
          <th class="ts-total-col">Total</th>
        </tr></thead>
        <tbody>`;

    playerPicks.forEach(player => {
      const info = scoreMap[player] || {};
      const isCut = info.isCut || info.isWD;
      const r1 = info.r1 || "--";
      const r2 = info.r2 || "--";
      const r3hasStarted = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r3) !== null);
      const r4hasStarted = Object.values(scoreMap).some(p => !p.isCut && !p.isWD && parseRelScore(p.r4) !== null);
      const r3pen = (isCut && r3hasStarted) ? penaltyScore("r3", playerPicks) : null;
      const r4pen = (isCut && r4hasStarted) ? penaltyScore("r4", playerPicks) : null;
      const r3disp = isCut
        ? (r3pen !== null ? `<span style='color:#c0392b;font-weight:500'>${fmtRel(r3pen)}</span><span style='color:var(--cut);font-size:10px;margin-left:3px'>pen</span>` : "<span style='color:var(--cut)'>--</span>")
        : (info.r3 || "--");
      const r4disp = isCut
        ? (r4pen !== null ? `<span style='color:#c0392b;font-weight:500'>${fmtRel(r4pen)}</span><span style='color:var(--cut);font-size:10px;margin-left:3px'>pen</span>` : "<span style='color:var(--cut)'>--</span>")
        : (info.r4 || "--");

      const r1v = parseRelScore(info.r1);
      const r2v = parseRelScore(info.r2);
      const r3v = isCut ? r3pen : parseRelScore(info.r3);
      const r4v = isCut ? r4pen : parseRelScore(info.r4);
      const scores = [r1v, r2v, r3v, r4v].filter(v => v !== null);
      const playerTotal = scores.length ? scores.reduce((a,b) => a+b, 0) : null;
      const totalFmt = playerTotal !== null ? fmtRel(playerTotal) + (isCut ? `<br><span style="font-size:10px;color:#b03030">cut</span>` : "") : "--";
      const totalCls = relClass(playerTotal);

      const r1c = relClass(r1v);
      const r2c = relClass(r2v);

      html += `<tr class="${isCut ? "cut-row" : ""}">
        <td>${player}${isCut ? ' <span style="font-size:10px;background:var(--red-light);color:#b03030;padding:1px 4px;border-radius:3px;font-weight:500">CUT</span>' : ""}</td>
        <td class="${r1c}">${r1}</td>
        <td class="${r2c}">${r2}</td>
        <td>${r3disp}</td>
        <td>${r4disp}</td>
        <td class="ts-total-col ${totalCls}">${totalFmt}</td>
      </tr>`;
    });

    html += `<tr class="ts-totals">
      <td>Team Total</td>
      <td class="${relClass(r1t)}">${r1t !== null ? fmtRel(r1t) : "--"}</td>
      <td class="${relClass(r2t)}">${r2t !== null ? fmtRel(r2t) : "--"}</td>
      <td class="${relClass(r3t)}">${r3t !== null ? fmtRel(r3t) : "--"}</td>
      <td class="${relClass(r4t)}">${r4t !== null ? fmtRel(r4t) : "--"}</td>
      <td class="ts-total-col ${relClass(overall)}">${overall !== null ? fmtRel(overall) : "--"}</td>
    </tr>`;

    html += `</tbody></table></div>`;
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// RENDER: FULL FIELD
// ═══════════════════════════════════════════════
function renderLeaderboard() {
  const el = document.getElementById("leaderboard");
  const drafted = allDrafted();
  const ownerOf = {};
  bettors().forEach(b => {
    picksFor(b).forEach(p => ownerOf[p] = b);
    const a = altFor(b);
    if (a) ownerOf[a] = b + " (alt)";
  });

  const players = Object.entries(scoreMap);
  if (!players.length) {
    el.innerHTML = '<p class="status-msg">No leaderboard data yet.</p>';
    return;
  }

  let html = '<div class="lb-wrap"><table class="lb-table">';
  html += `<thead><tr>
    <th>Pos</th><th>Player</th>
    <th class="right">Score</th><th class="right">Today</th>
    <th>Thru</th><th class="right">R1</th><th class="right">R2</th><th class="right">R3</th><th class="right">R4</th>
  </tr></thead><tbody>`;

  players.forEach(([name, info]) => {
    const tracked = drafted.has(name);
    const owner = ownerOf[name];
    const sc = parseRelScore(info.score);
    const td = parseRelScore(info.today);
    const isCut = info.isCut || info.isWD;

    const ownerKey = owner ? owner.replace(" (alt)", "") : null;
    const ownerColor = ownerKey ? (CONFIG.colors[ownerKey] || { bg: "#1a1a18", text: "#fff" }) : null;
    const nameStyle = ownerColor ? `style="color:${ownerColor.bg};font-weight:600"` : "";
    const pillStyle = ownerColor ? `style="background:${ownerColor.bg};color:#fff"` : "";
    html += `<tr class="${tracked ? "tracked" : ""}${isCut ? " cut-row" : ""}">
      <td class="muted">${info.pos || "—"}</td>
      <td><span ${nameStyle}>${name}</span>${owner ? `<span class="owner-pill" ${pillStyle}>${owner}</span>` : ""}</td>
      <td class="mono right ${relClass(sc)}">${info.score || "--"}</td>
      <td class="mono right ${relClass(td)}">${info.today || "--"}</td>
      <td class="muted">${info.thru || "--"}</td>
      <td class="mono right muted">${info.r1 || "--"}</td>
      <td class="mono right muted">${info.r2 || "--"}</td>
      <td class="mono right muted">${info.r3 || "--"}</td>
      <td class="mono right muted">${info.r4 || "--"}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// MAIN REFRESH LOOP
// ═══════════════════════════════════════════════
async function refresh() {
  if (fetching) return;
  fetching = true;

  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Loading...";
  document.getElementById("status-msg").textContent = "";
  document.getElementById("status-msg").classList.remove("error");

  try {
    scoreMap = await fetchScores();
    checkNameMismatches();
    renderScoreboard();
    renderPoints();
    renderTeamScores();
    renderLeaderboard();
    const now = new Date();
    document.getElementById("last-update").textContent =
      now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    document.getElementById("live-indicator").textContent = "FINAL";
    resetCountdown();
  } catch (e) {
    document.getElementById("status-msg").textContent = "Error fetching scores: " + e.message;
    document.getElementById("status-msg").classList.add("error");
    document.getElementById("live-indicator").textContent = "ERROR";
  } finally {
    fetching = false;
    btn.disabled = false;
    btn.textContent = "Refresh";
  }
}

function resetCountdown() {
  // Tournament archived — no auto-refresh, snapshot is frozen.
  clearInterval(countdownTimer);
}

function showTab(id) {
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.getAttribute("onclick").includes("'" + id + "'"))
  );
  document.querySelectorAll(".section").forEach(s =>
    s.classList.toggle("active", s.id === id)
  );
}

// ── BOOT ──
refresh();
</script>
</body>
</html>
